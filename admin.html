<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEUNG RI 2026 - ADMIN PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f1f5f9; }
        .admin-card { background: #1e293b; border: 1px solid #334151; border-radius: 20px; }
        .tab-btn.active { background: #2563eb; color: white; }
        /* Bracket Admin */
        .bracket-scroll { display: flex; gap: 40px; padding: 20px; overflow-x: auto; }
        .round-column { display: flex; flex-direction: column; justify-content: space-around; min-width: 200px; }
        .match-box { position: relative; border-left: 4px solid #3b82f6; padding-left: 10px; margin: 15px 0; min-height: 100px; display: flex; flex-direction: column; justify-content: center; background: rgba(255,255,255,0.02); }
        .player-line { height: 45px; border-bottom: 1px solid #334151; padding: 5px 10px; cursor: pointer; }
        .is-winner { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
    </style>
</head>
<body>
    <div class="max-w-[1800px] mx-auto p-4 md:p-6">
        <header class="flex justify-between items-center mb-8 p-6 admin-card border-b-4 border-blue-600">
            <h1 class="text-2xl font-black italic">SEUNG RI <span class="text-blue-500">ADMIN</span></h1>
            <nav class="flex bg-slate-800 p-1.5 rounded-2xl">
                <button onclick="switchMain('users')" class="tab-btn active px-6 py-2 rounded-xl text-[10px] font-black uppercase">Tài khoản</button>
                <button onclick="switchMain('control')" class="tab-btn px-6 py-2 rounded-xl text-[10px] font-black uppercase ml-2">Sơ đồ & Điều hành</button>
            </nav>
        </header>

        <div id="sec-users" class="space-y-6">
            <div class="admin-card p-6">
                <table class="w-full text-left">
                    <thead class="text-slate-500 text-[10px] uppercase"><tr><th class="p-4">Email</th><th class="p-4">Password</th><th class="p-4 text-center">Thao tác</th></tr></thead>
                    <tbody id="userListBody"></tbody>
                </table>
            </div>
        </div>

        <div id="sec-control" class="hidden space-y-6">
            <div class="admin-card p-6 flex gap-4 items-center">
                <select id="bracketSelect" onchange="loadAdminBracket()" class="bg-slate-800 border-none rounded-xl p-3 w-64"></select>
                <button onclick="manualDraw()" class="bg-red-600 px-6 py-3 rounded-xl font-black text-xs uppercase">Bốc thăm lại</button>
            </div>
            <div class="admin-card min-h-[600px] overflow-hidden">
                <div id="adminBracketContent" class="bracket-scroll"></div>
            </div>
        </div>
    </div>

    <script>
const firebaseConfig = {
  apiKey: "AIzaSyBhN3Riezh-Ka20Salm1COtFbW9UdCLRdM",
  authDomain: "seungrichampionship-90984.firebaseapp.com",
  databaseURL: "https://seungrichampionship-90984-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "seungrichampionship-90984",
  storageBucket: "seungrichampionship-90984.firebasestorage.app",
  messagingSenderId: "1031691130771",
  appId: "1:1031691130771:web:1dc2ade7290b60f9d87a66",
  measurementId: "G-QC40451RRY"
};
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // 1. Tải tài khoản đoàn
        db.ref('seungri_v2026/users').on('value', snap => {
            const body = document.getElementById('userListBody');
            body.innerHTML = "";
            const data = snap.val();
            if(!data) return;
            Object.keys(data).forEach(key => {
                const u = data[key];
                body.innerHTML += `<tr class="border-b border-slate-800">
                    <td class="p-4">${key.replace(/,/g,'.')}</td>
                    <td class="p-4"><input type="text" value="${u.pass}" onchange="updatePass('${key}', this.value)" class="bg-slate-900 border-none p-1 rounded"></td>
                    <td class="p-4 text-center"><button onclick="deleteUser('${key}')" class="text-red-500">Xóa</button></td>
                </tr>`;
            });
        });

        function updatePass(key, pass) { db.ref('seungri_v2026/users/'+key).update({pass}); }
        function deleteUser(key) { if(confirm("Xóa?")) db.ref('seungri_v2026/users/'+key).remove(); }

        // 2. Bốc thăm & Điều hành
        function switchMain(id) {
            document.getElementById('sec-users').classList.toggle('hidden', id !== 'users');
            document.getElementById('sec-control').classList.toggle('hidden', id !== 'control');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if(id === 'control') {
                db.ref('seungri_v2026/registrations').once('value', snap => {
                    const regs = snap.val();
                    const cats = new Set();
                    if(regs) Object.values(regs).forEach(r => cats.add(`${r.category} - ${r.subType}`));
                    document.getElementById('bracketSelect').innerHTML = Array.from(cats).map(c => `<option value="${c}">${c}</option>`).join('');
                });
            }
        }

        async function manualDraw() {
            const cat = document.getElementById('bracketSelect').value;
            const snap = await db.ref('seungri_v2026/registrations').once('value');
            const players = Object.values(snap.val()).filter(r => `${r.category} - ${r.subType}` === cat).sort(() => Math.random() - 0.5);
            // Thuật toán đơn giản tạo vòng 1
            const size = Math.pow(2, Math.ceil(Math.log2(players.length))) || 2;
            let r1 = [];
            for(let i=0; i<size; i+=2) {
                let p1 = players[i] || {name:'BYE', club:'-'};
                let p2 = players[i+1] || {name:'BYE', club:'-'};
                let m = {p1, p2, winner: null, matchNo: (i/2+1)};
                if(p1.name==='BYE') m.winner = p2; else if(p2.name==='BYE') m.winner = p1;
                r1.push(m);
            }
            let rounds = [r1];
            while(r1.length > 1) {
                let nextR = [];
                for(let j=0; j<r1.length; j+=2) {
                    nextR.push({p1: r1[j].winner || {name:'?'}, p2: r1[j+1].winner || {name:'?'}, winner: null});
                }
                rounds.push(nextR); r1 = nextR;
            }
            await db.ref('seungri_v2026/brackets/' + cat).set({rounds});
            alert("Bốc thăm xong!");
        }

        db.ref('seungri_v2026/brackets').on('value', snap => {
            window.allBrackets = snap.val() || {};
            loadAdminBracket();
        });

        function loadAdminBracket() {
            const cat = document.getElementById('bracketSelect').value;
            const area = document.getElementById('adminBracketContent');
            if(!cat || !window.allBrackets[cat]) return area.innerHTML = "";
            area.innerHTML = window.allBrackets[cat].rounds.map((round, ri) => `
                <div class="round-column">
                    ${round.map((m, mi) => `
                        <div class="match-box">
                            <div class="player-line ${m.winner?.name===m.p1.name?'is-winner':''}" onclick="setWinner('${cat}',${ri},${mi},1)">${m.p1.name}</div>
                            <div class="player-line ${m.winner?.name===m.p2.name?'is-winner':''}" onclick="setWinner('${cat}',${ri},${mi},2)">${m.p2.name}</div>
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        async function setWinner(cat, ri, mi, pNum) {
            const bracket = window.allBrackets[cat];
            const m = bracket.rounds[ri][mi];
            const win = pNum === 1 ? m.p1 : m.p2;
            if(win.name === 'BYE' || win.name === '?') return;
            bracket.rounds[ri][mi].winner = win;
            if(bracket.rounds[ri+1]) {
                let nextMi = Math.floor(mi/2);
                if(mi%2===0) bracket.rounds[ri+1][nextMi].p1 = win; else bracket.rounds[ri+1][nextMi].p2 = win;
            }
            await db.ref('seungri_v2026/brackets/' + cat).set(bracket);
        }
    </script>
</body>
</html>
