<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEUNG RI LIVE - PROFESSIONAL EDITION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; color: #0f172a; overflow-x: hidden; }
        .glass-card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 10px 15px -3px rgba(0, 0, 0, 0.03); }
        select, textarea { border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; padding: 10px 16px !important; outline: none !important; font-weight: 600; font-size: 14px; transition: all 0.2s; background: #ffffff; width: 100%; }
        select:focus, textarea:focus { border-color: #2563eb !important; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .tab-btn { position: relative; font-weight: 700; color: #64748b; transition: all 0.3s; padding: 8px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        .tab-btn.active { color: #2563eb; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -4px; left: 20%; right: 20%; height: 3px; background: #2563eb; border-radius: 99px; }
        .bracket-scroll { display: flex; gap: 3.5rem; padding: 1rem 0; align-items: stretch; width: max-content; }
        .round-column { display: flex; flex-direction: column; justify-content: space-around; min-width: 250px; }
        .match-box { position: relative; border-left: 3px solid #cbd5e1; padding-left: 14px; margin: 28px 0; min-height: 110px; display: flex; flex-direction: column; justify-content: center; }
        .match-no-container { position: absolute; left: -52px; top: 50%; transform: translateY(-50%); font-weight: 800; color: #1e40af; font-size: 14px; }
        .match-no-input { background: transparent !important; border: none !important; width: 30px !important; padding: 0 !important; text-align: center !important; color: #1e40af !important; font-weight: 900 !important; }
        .player-line { height: 46px; border-bottom: 2px solid #f1f5f9; display: flex; flex-direction: column; justify-content: center; padding: 0 12px; background: white; position: relative; cursor: pointer; }
        .blue-side { border-bottom: 3px solid #3b82f6 !important; }
        .red-side { border-bottom: 3px solid #ef4444 !important; }
        .is-winner { background: #f0f7ff; }
        .is-winner::after { content: "★"; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: #3b82f6; font-size: 16px; }
        .player-name { font-size: 13px; font-weight: 900; text-transform: uppercase; color: #1e293b; }
        .player-club { font-size: 10px; font-weight: 500; color: #94a3b8; text-transform: uppercase; }
        .medal-card { padding: 10px 16px; border-radius: 14px; font-weight: 700; display: flex; align-items: center; gap: 12px; border: 1px solid transparent; margin-bottom: 8px; }
        .gold-card { background: #fffbeb; border-color: #fde68a; color: #92400e; }
        .silver-card { background: #f8fafc; border-color: #e2e8f0; color: #334155; }
        .bronze-card { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }
        .court-label { background: #0f172a; color: white; padding: 4px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; }
    </style>
</head>
<body>

<div class="max-w-[1700px] mx-auto p-4 md:p-6">
    <header class="bg-white p-6 rounded-[2rem] shadow-sm mb-8 flex flex-col md:flex-row justify-between items-center gap-6 border-b-4 border-blue-600">
        <div class="flex items-center gap-6">
            <h1 class="text-3xl font-[900] text-slate-900 uppercase italic tracking-tighter">SEUNG RI <span class="text-blue-600">LIVE</span></h1>
            <nav class="flex bg-slate-50 p-1 rounded-2xl">
                <button onclick="switchTab('Poomsae')" id="tabPoomsae" class="tab-btn active">Quyền</button>
                <button onclick="switchTab('Kyorugi')" id="tabKyorugi" class="tab-btn">Đối kháng</button>
                <button onclick="switchTab('Speed')" id="tabSpeed" class="tab-btn">Tốc độ</button>
            </nav>
        </div>
        <button onclick="toggleLogin()" id="loginBtn" class="bg-slate-900 text-white px-8 py-3 rounded-2xl font-black text-[11px] uppercase shadow-lg">Admin Login</button>
    </header>

    <div class="bg-white p-5 rounded-[1.5rem] shadow-sm mb-10 flex flex-wrap items-center gap-6 border-l-[6px] border-blue-600">
        <div class="flex-1 min-w-[300px]">
            <span class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Chọn hạng cân</span>
            <select id="catSelect" onchange="switchCat()"></select>
        </div>
        <div class="w-40">
            <span class="text-[10px] font-bold text-slate-400 uppercase mb-1 block">Sân thi đấu</span>
            <select id="courtSelect" onchange="updateGlobalCourt(this.value)">
                <option value="1">SÂN 1</option><option value="2">SÂN 2</option><option value="3">SÂN 3</option>
            </select>
        </div>
        <button onclick="exportPNG()" class="bg-slate-100 text-slate-900 px-8 py-3 rounded-xl text-[11px] font-black uppercase hover:bg-slate-200">Export PNG</button>
    </div>

    <div class="grid lg:grid-cols-4 gap-10">
        <aside class="lg:col-span-1 space-y-6">
            <div class="glass-card p-6">
                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 text-center tracking-widest italic border-b pb-2">Danh sách VĐV</h3>
                <textarea id="bulkInput" class="w-full h-80 text-[13px] bg-slate-50 border-none mb-4" placeholder="Họ tên - Đơn vị"></textarea>
                <div class="space-y-2">
                    <button onclick="importPlayers()" class="bg-blue-600 text-white w-full py-3 rounded-xl font-bold text-[11px] uppercase">1. Lưu danh sách</button>
                    <button onclick="generateGroups()" class="bg-red-500 text-white w-full py-4 rounded-xl font-black text-[11px] uppercase shadow-lg italic">2. Bốc thăm (Draw)</button>
                    <button onclick="resetData()" class="text-red-400 w-full py-2 text-[10px] font-bold uppercase hover:underline">Xóa kết quả</button>
                </div>
            </div>
            <div class="glass-card p-6 bg-slate-50/30">
                <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 text-center tracking-widest">Huy chương hạng cân</h3>
                <div id="medalList" class="space-y-2"></div>
            </div>
        </aside>

        <main class="lg:col-span-3 overflow-x-auto min-h-[900px]">
            <div id="captureArea">
                <div id="displayArea" class="space-y-20"></div>
            </div>
        </main>
    </div>
</div>

<script>
const DATA_TREE = {
    Poomsae: {
        mains: ["Quyền Cá Nhân Nam", "Quyền Cá Nhân Nữ", "Quyền Đôi Nam Nữ", "Quyền Đồng Đội Nam", "Quyền Đồng Đội Nữ"],
        ages_ind: ["Nhóm 1 (Sinh 2018+)", "Nhóm 2 (2017-2016)", "Nhóm 3 (2015-2014)", "Nhóm 4 (2013-2012)", "Nhóm 5 (2011-2010)", "Nhóm 6 (2009-1996)", "Nhóm 7 (1995-1986)", "Nhóm 8 (1985-)"],
        belts_ind: ["Trắng", "Vàng", "Xanh Lá", "Xanh Dương", "Đỏ", "Đỏ 1-2-3", "Đỏ Đen/Đen"],
        ages_grp: ["Dưới 10 tuổi", "11-14 tuổi", "15-30 tuổi", "Trên 31 tuổi"],
        belts_grp: ["Trắng/Vàng/Xanh lá", "Xanh dương/Đỏ", "Đỏ đen/Đen"]
    },
    Kyorugi: {
        mains: ["Đối kháng Nam", "Đối kháng Nữ"],
        ages: {
            "Dưới 11 tuổi": ["25kg", "28kg", "31kg", "34kg", "38kg", "42kg", "Trên 42kg"],
            "12-14 tuổi": ["33kg", "37kg", "41kg", "44kg", "47kg", "51kg", "55kg", "59kg", "Trên 59kg"],
            "15-17 tuổi": ["42kg", "44kg", "46kg", "49kg", "52kg", "55kg", "59kg", "63kg", "68kg", "Trên 68kg"]
        }
    },
    Speed: { mains: ["Speed Kick Nam", "Speed Kick Nữ"], ages: ["Dưới 11 tuổi", "12-14 tuổi", "15-17 tuổi"] }
};

const firebaseConfig = {
    apiKey: "AIzaSyBhN3Riezh-Ka20Salm1COtFbW9UdCLRdM",
    authDomain: "seungrichampionship-90984.firebaseapp.com",
    databaseURL: "https://seungrichampionship-90984-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "seungrichampionship-90984",
    storageBucket: "seungrichampionship-90984.firebasestorage.app",
    messagingSenderId: "1031691130771",
    appId: "1:1031691130771:web:1dc2ade7290b60f9d87a66"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("seungri_final_v5");
let store = {}, currentTab = 'Poomsae', current = "", isAdmin = false;

db.on('value', snap => { store = snap.val() || {}; initData(); });

function getFullCategoryList(tab) {
    let list = [];
    if(tab === 'Poomsae') {
        DATA_TREE.Poomsae.mains.forEach(m => {
            let ages = m.includes('Cá Nhân') ? DATA_TREE.Poomsae.ages_ind : DATA_TREE.Poomsae.ages_grp;
            let belts = m.includes('Cá Nhân') ? DATA_TREE.Poomsae.belts_ind : DATA_TREE.Poomsae.belts_grp;
            ages.forEach(a => belts.forEach(b => list.push(`${m} - ${a} - ${b}`)));
        });
    } else if(tab === 'Kyorugi') {
        DATA_TREE.Kyorugi.mains.forEach(m => {
            Object.keys(DATA_TREE.Kyorugi.ages).forEach(a => {
                DATA_TREE.Kyorugi.ages[a].forEach(w => list.push(`${m} - ${a} - ${w}`));
            });
        });
    } else {
        DATA_TREE.Speed.mains.forEach(m => DATA_TREE.Speed.ages.forEach(a => list.push(`${m} - ${a}`)));
    }
    return list;
}

function initData() {
    const sel = document.getElementById('catSelect');
    const list = getFullCategoryList(currentTab);
    sel.innerHTML = list.map(item => `<option value="${item}" ${current===item?'selected':''}>${item}</option>`).join('');
    if(!current) current = list[0];
    const catData = store[current] || {};
    document.getElementById('courtSelect').value = catData.court || "1";
    document.getElementById('bulkInput').value = (catData.players || []).map(p => `${p.name} - ${p.club}`).join('\n');
    renderGroups();
    updateTabUI();
}

function switchTab(t) { currentTab = t; current = ""; initData(); }
function switchCat() { current = document.getElementById('catSelect').value; initData(); }

function updateTabUI() {
    ['Poomsae', 'Kyorugi', 'Speed'].forEach(t => {
        document.getElementById('tab'+t).className = `tab-btn ${t === currentTab ? 'active' : ''}`;
    });
}

function updateGlobalCourt(val) { if(!isAdmin) return alert("Vui lòng Login Admin!"); db.child(current).update({ court: val }); }

function importPlayers() {
    const players = document.getElementById('bulkInput').value.split('\n').filter(l => l.trim()).map(l => {
        let p = l.split('-'); return { name: p[0]?.trim().toUpperCase(), club: p[1]?.trim().toUpperCase() || '...' };
    });
    db.child(current).update({ players: players });
    alert("Đã lưu danh sách!");
}

function generateGroups() {
    let data = store[current];
    if(!data?.players || data.players.length < 2) return alert("Nhập ít nhất 2 VĐV!");
    let p = [...data.players].sort(() => Math.random() - 0.5);
    let groups = [];
    let size = (currentTab === 'Kyorugi') ? p.length : 4;
    for (let i = 0; i < p.length; i += size) {
        let chunk = p.slice(i, i + size);
        if (currentTab === 'Speed') {
            groups.push({ name: `NHÓM ${groups.length+1}`, type: 'speed', players: chunk.map(pl => ({...pl, score: 0})) });
        } else {
            let bSize = Math.pow(2, Math.ceil(Math.log2(chunk.length)));
            let pArr = Array(bSize).fill(null).map(() => ({ name: 'BYE', club: '-' }));
            chunk.forEach((pl, idx) => {
                let pos = 0, temp = idx;
                for(let j=0; j<Math.log2(bSize); j++) { pos = (pos << 1) | (temp & 1); temp >>= 1; }
                pArr[pos] = pl;
            });
            let r1 = [];
            for(let j=0; j<pArr.length; j+=2) {
                let m = { p1: pArr[j], p2: pArr[j+1], winner: null, matchNo: '' };
                if(m.p2.name==='BYE') m.winner=m.p1; else if(m.p1.name==='BYE') m.winner=m.p2;
                r1.push(m);
            }
            let bracket = [r1];
            while(bracket[bracket.length-1].length > 1) {
                let prev = bracket[bracket.length-1], next = [];
                for(let k=0; k<prev.length; k+=2) next.push({ p1: prev[k].winner||{name:'?'}, p2: prev[k+1].winner||{name:'?'}, winner: null, matchNo: '' });
                bracket.push(next);
            }
            groups.push({ name: currentTab==='Kyorugi' ? "SƠ ĐỒ THI ĐẤU" : `NHÓM ${groups.length+1}`, type: 'bracket', rounds: bracket });
        }
    }
    db.child(current).update({ groups: groups });
}

function renderGroups() {
    const area = document.getElementById('displayArea');
    const sideMedalArea = document.getElementById('medalList');
    area.innerHTML = ''; sideMedalArea.innerHTML = '';
    const data = store[current];
    if(!data?.groups) return area.innerHTML = "<div class='p-20 text-center opacity-20 font-black text-2xl uppercase'>Chưa bốc thăm</div>";

    data.groups.forEach((g, gi) => {
        let div = document.createElement('div'); div.className = 'glass-card p-10 relative overflow-hidden';
        div.innerHTML = `<div class="flex items-center gap-4 mb-8 border-b-2 border-slate-50 pb-6">
            <span class="court-label">SÂN ${data.court || 1}</span>
            <h3 class="font-[900] uppercase italic text-xl text-slate-800">${g.name}</h3>
        </div>`;
        
        if(g.type === 'speed') {
            let s = [...g.players].sort((a,b) => b.score - a.score);
            let rows = g.players.map((p,pi) => `<div class="flex items-center gap-6 border-b border-slate-50 py-3"><div class="flex-1"><div class="player-name">${p.name}</div><div class="player-club">${p.club}</div></div><input type="number" class="w-20 border-2 border-blue-100 rounded-xl text-center font-black p-2" value="${p.score||0}" onchange="updateSpeed(${gi},${pi},this.value)"></div>`).join('');
            div.innerHTML += `<div class="grid md:grid-cols-2 gap-16">${rows} <div class="space-y-2">${renderMedalCard('🥇 VÀNG', s[0]?.score>0?s[0]:null, 'gold')}${renderMedalCard('🥈 BẠC', s[1]?.score>0?s[1]:null, 'silver')}${renderMedalCard('🥉 ĐỒNG', s[2]?.score>0?s[2]:null, 'bronze')}</div></div>`;
            if(s[0]?.score>0) sideMedalArea.innerHTML += renderMedalCard('🥇', s[0], 'gold');
        } else {
            let bWrap = document.createElement('div'); bWrap.className = 'bracket-scroll';
            g.rounds.forEach((round, ri) => {
                let col = document.createElement('div'); col.className = 'round-column';
                round.forEach((m, mi) => {
                    col.innerHTML += `<div class="match-box">
                        <div class="match-no-container">(<input type="text" class="match-no-input" value="${m.matchNo||''}" onchange="updateMatchNo(${gi},${ri},${mi},this.value)">)</div>
                        <div class="player-line blue-side ${m.winner?.name===m.p1.name?'is-winner':''}" onclick="setWin(${gi},${ri},${mi},1)"><span class="player-name">${m.p1.name}</span><span class="player-club">${m.p1.club}</span></div>
                        <div class="player-line red-side ${m.winner?.name===m.p2.name?'is-winner':''}" onclick="setWin(${gi},${ri},${mi},2)"><span class="player-name">${m.p2.name}</span><span class="player-club">${m.p2.club}</span></div>
                    </div>`;
                });
                bWrap.appendChild(col);
            });
            let last = g.rounds[g.rounds.length-1][0];
            let gold = last.winner;
            let silver = gold ? (gold.name === last.p1.name ? last.p2 : last.p1) : null;
            let semi = g.rounds.length >= 2 ? g.rounds[g.rounds.length-2] : [];
            let b1 = semi[0]?.winner ? (semi[0].winner.name === semi[0].p1.name ? semi[0].p2 : semi[0].p1) : null;
            let b2 = semi[1]?.winner ? (semi[1].winner.name === semi[1].p1.name ? semi[1].p2 : semi[1].p1) : null;

            bWrap.innerHTML += `<div class="min-w-[240px] border-l-2 border-slate-50 pl-10 space-y-2">
                <h4 class="text-[10px] font-black text-slate-300 mb-2 uppercase">KẾT QUẢ</h4>
                ${renderMedalCard('🥇 VÀNG', gold, 'gold')}${renderMedalCard('🥈 BẠC', silver?.name!=='?'?silver:null, 'silver')}${renderMedalCard('🥉 ĐỒNG', b1?.name!=='BYE'?b1:null, 'bronze')}${renderMedalCard('🥉 ĐỒNG', b2?.name!=='BYE'?b2:null, 'bronze')}
            </div>`;
            div.appendChild(bWrap);
            if(gold) sideMedalArea.innerHTML += renderMedalCard('🥇', gold, 'gold');
        }
        area.appendChild(div);
    });
}

function renderMedalCard(rank, p, type) {
    if(!p || p.name === '?' || p.name === 'BYE') return `<div class="medal-card opacity-10">---</div>`;
    const style = type === 'gold' ? 'gold-card' : (type === 'silver' ? 'silver-card' : 'bronze-card');
    return `<div class="medal-card ${style}"><span>${rank.split(' ')[0]}</span><div><div class="text-[12px] font-[900] uppercase">${p.name}</div><div class="text-[9px] font-bold opacity-70">${p.club}</div></div></div>`;
}

function setWin(gi, ri, mi, pNum) { if(!isAdmin) return alert("Login Admin!"); let g = store[current].groups[gi], m = g.rounds[ri][mi], win = pNum===1?m.p1:m.p2; if(win.name==='?'||win.name==='BYE') return; m.winner = (m.winner?.name === win.name) ? null : win; if(g.rounds[ri+1]) { let nMi = Math.floor(mi/2); if(mi%2===0) g.rounds[ri+1][nMi].p1=m.winner||{name:'?'}; else g.rounds[ri+1][nMi].p2=m.winner||{name:'?'}; } db.child(current).update({ groups: store[current].groups }); }
function updateSpeed(gi, pi, val) { if(!isAdmin) return alert("Login Admin!"); store[current].groups[gi].players[pi].score = parseInt(val)||0; db.child(current).update({ groups: store[current].groups }); }
function updateMatchNo(gi, ri, mi, val) { if(!isAdmin) return alert("Login Admin!"); store[current].groups[gi].rounds[ri][mi].matchNo = val; db.child(current).update({ groups: store[current].groups }); }
function resetData() { if(!isAdmin) return alert("Login Admin!"); if(confirm("Xóa bốc thăm?")) db.child(current).child('groups').remove(); }
function toggleLogin() { let p = prompt("Pass:"); if(p === '123') { isAdmin = true; document.getElementById('loginBtn').innerText = "ADMIN ON"; initData(); } else { isAdmin = false; document.getElementById('loginBtn').innerText = "Admin Login"; initData(); } }
async function exportPNG() { const canvas = await html2canvas(document.getElementById('captureArea'), { scale: 3, useCORS: true }); const link = document.createElement('a'); link.download = `${current}.png`; link.href = canvas.toDataURL(); link.click(); }
</script>
</body>
</html>
