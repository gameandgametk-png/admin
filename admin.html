<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEUNG RI LIVE - TOURNAMENT 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #1e293b; overflow-x: hidden; }
        .admin-card { background: white; border-radius: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        select, textarea { border: 2px solid #e2e8f0 !important; border-radius: 12px !important; padding: 10px !important; outline: none !important; font-weight: 600; width: 100%; transition: 0.2s; }
        select:focus, textarea:focus { border-color: #2563eb !important; background: white; }
        .tab-active { background-color: white !important; border-bottom: 4px solid #2563eb !important; color: #2563eb !important; }
        .bracket-scroll { display: flex; gap: 4rem; padding: 1.5rem; align-items: stretch; width: max-content; }
        .round-column { display: flex; flex-direction: column; justify-content: space-around; min-width: 250px; }
        .match-box { position: relative; border-left: 4px solid #334155; padding-left: 12px; margin: 25px 0; min-height: 110px; display: flex; flex-direction: column; justify-content: center; }
        .match-number-box { position: absolute; left: -45px; top: 50%; transform: translateY(-50%); width: 34px; height: 34px; border: 2px solid #1e40af; border-radius: 6px; background: white; z-index: 50; display: flex; align-items: center; justify-content: center; font-weight: 900; color: #1e40af; }
        .player-line { height: 48px; border-bottom: 3px solid #cbd5e1; display: flex; flex-direction: column; justify-content: center; padding: 0 10px; background: white; position: relative; cursor: pointer; }
        .blue-side { border-bottom-color: #2563eb !important; }
        .red-side { border-bottom-color: #dc2626 !important; }
        .is-winner { background: #fff1f2; }
        .is-winner::after { content: "WIN ★"; position: absolute; right: 5px; top: 2px; font-size: 8px; color: #dc2626; font-weight: 900; }
        .medal-tag { padding: 12px; border-radius: 12px; font-weight: 800; display: flex; flex-direction: column; border-left: 8px solid #ddd; margin-bottom: 10px; min-width: 250px; }
        .gold-bg { background: linear-gradient(to right, #fef3c7, #fde68a); border-color: #d97706; }
        .admin-only { display: none !important; }
        .admin-mode .admin-only { display: block !important; }
    </style>
</head>
<body id="mainBody">

<div class="max-w-[1800px] mx-auto p-4">
    <header class="bg-white p-5 rounded-2xl shadow-sm mb-6 flex flex-col md:flex-row justify-between items-center gap-4 border-b-4 border-blue-600">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black text-slate-900 uppercase italic tracking-tighter">SEUNG RI <span class="text-blue-600">LIVE</span></h1>
            <button onclick="toggleLogin()" id="loginBtn" class="bg-slate-100 text-slate-600 px-5 py-2.5 rounded-xl font-bold text-xs uppercase">Admin Login</button>
        </div>
        <nav class="flex bg-slate-100 p-1.5 rounded-2xl">
            <button onclick="switchTab('Poomsae')" id="tabPoomsae" class="px-6 py-2.5 rounded-xl font-black text-[10px] uppercase transition">Quyền</button>
            <button onclick="switchTab('Kyorugi')" id="tabKyorugi" class="px-6 py-2.5 rounded-xl font-black text-[10px] uppercase transition ml-2">Đối kháng</button>
            <button onclick="switchTab('Speed')" id="tabSpeed" class="px-6 py-2.5 rounded-xl font-black text-[10px] uppercase transition ml-2">Tốc độ</button>
        </nav>
    </header>

    <div class="bg-white p-4 rounded-2xl shadow-sm mb-8 flex flex-wrap items-center gap-4 border-l-8 border-blue-600">
        <span class="text-[10px] font-black uppercase text-slate-400 italic">HẠNG CÂN ĐANG CHỌN:</span>
        <select id="catSelect" onchange="switchCat()" class="bg-slate-50 flex-1 md:max-w-xl"></select>
        <button id="exportBtn" onclick="exportPNG()" class="bg-slate-800 text-white px-6 py-3 rounded-xl text-[10px] font-black uppercase shadow-lg">EXPORT PNG</button>
    </div>

    <div class="grid lg:grid-cols-4 gap-8">
        <aside class="lg:col-span-1">
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <h3 class="text-[10px] font-black text-slate-500 uppercase mb-4 tracking-widest border-b pb-2 text-center">DANH SÁCH VĐV</h3>
                <textarea id="bulkInput" class="w-full h-96 text-xs bg-slate-50 mb-4" placeholder="Tên - Đơn vị"></textarea>
                <div class="admin-only space-y-2">
                    <button onclick="importPlayers()" class="bg-slate-800 text-white w-full py-3 rounded-xl font-bold text-xs uppercase">1. LƯU DANH SÁCH</button>
                    <button onclick="generateGroups()" class="bg-red-600 text-white w-full py-4 rounded-xl font-black text-xs uppercase shadow-lg italic">2. BỐC THĂM / DRAW</button>
                    <button onclick="resetData()" class="bg-slate-100 text-red-500 w-full py-2 rounded-xl font-bold text-[10px] uppercase">Xóa dữ liệu bốc thăm hạng cân này</button>
                </div>
            </div>
            <div class="mt-6 admin-card p-6">
                <h3 class="text-[10px] font-black text-slate-500 uppercase mb-4 text-center">🥇 HUY CHƯƠNG</h3>
                <div id="medalList" class="space-y-2"></div>
            </div>
        </aside>

        <main class="lg:col-span-3 overflow-x-auto min-h-[800px] bg-white rounded-3xl p-4 border border-slate-200">
            <div id="captureArea">
                <div id="displayArea" class="space-y-12"></div>
            </div>
        </main>
    </div>
</div>

<script>
// --- CẤU CẤU HÌNH NỘI DUNG TỰ ĐỘNG ---
const DATA_TREE = {
    Poomsae: {
        mains: ["Quyền Cá Nhân Nam", "Quyền Cá Nhân Nữ", "Quyền Đôi Nam Nữ", "Quyền Đồng Đội Nam", "Quyền Đồng Đội Nữ"],
        ages_ind: ["Dưới 8 tuổi", "9-10 tuổi", "11-12 tuổi", "13-14 tuổi", "15-17 tuổi", "18-30 tuổi", "31-40 tuổi", "Trên 41 tuổi"],
        belts_ind: ["Trắng", "Vàng", "Xanh Lá", "Xanh Dương", "Đỏ", "Đỏ 1-2-3", "Đỏ Đen/Đen"],
        ages_grp: ["Dưới 10 tuổi", "11-14 tuổi", "15-30 tuổi", "Trên 31 tuổi"],
        belts_grp: ["Trắng/Vàng/Xanh lá", "Xanh dương/Đỏ", "Đỏ đen/Đen"]
    },
    Kyorugi: {
        mains: ["Đối kháng Nam", "Đối kháng Nữ"],
        ages: {
            "Dưới 11 tuổi": ["25kg", "28kg", "31kg", "34kg", "38kg", "42kg", "Trên 42kg"],
            "12-14 tuổi": ["33kg", "37kg", "41kg", "44kg", "47kg", "51kg", "55kg", "59kg", "Trên 59kg", "45kg", "48kg", "53kg", "57kg", "61kg", "65kg", "Trên 65kg"],
            "15-17 tuổi": ["42kg", "44kg", "46kg", "49kg", "52kg", "55kg", "59kg", "63kg", "68kg", "Trên 68kg", "45kg", "48kg", "51kg", "73kg", "78kg", "Trên 78kg"]
        }
    },
    Speed: { mains: ["Speed Kick Nam", "Speed Kick Nữ"], ages: ["Dưới 11 tuổi", "12-14 tuổi", "15-17 tuổi"], belts: ["Tự do"] }
};

const firebaseConfig = {
    apiKey: "AIzaSyBhN3Riezh-Ka20Salm1COtFbW9UdCLRdM",
    authDomain: "seungrichampionship-90984.firebaseapp.com",
    databaseURL: "https://seungrichampionship-90984-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "seungrichampionship-90984",
    storageBucket: "seungrichampionship-90984.firebasestorage.app",
    messagingSenderId: "1031691130771",
    appId: "1:1031691130771:web:1dc2ade7290b60f9d87a66"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("seungri_final_v5");
let store = {}, currentTab = 'Poomsae', current = "", isAdmin = false;

// 1. TỰ ĐỘNG KHỞI TẠO DANH SÁCH (CHỈ CHẠY 1 LẦN)
function getFullCategoryList(tab) {
    let list = [];
    if(tab === 'Poomsae') {
        DATA_TREE.Poomsae.mains.forEach(m => {
            let ages = m.includes('Cá Nhân') ? DATA_TREE.Poomsae.ages_ind : DATA_TREE.Poomsae.ages_grp;
            let belts = m.includes('Cá Nhân') ? DATA_TREE.Poomsae.belts_ind : DATA_TREE.Poomsae.belts_grp;
            ages.forEach(a => belts.forEach(b => list.push(`${m} - ${a} - ${b}`)));
        });
    } else if(tab === 'Kyorugi') {
        DATA_TREE.Kyorugi.mains.forEach(m => {
            Object.keys(DATA_TREE.Kyorugi.ages).forEach(a => {
                DATA_TREE.Kyorugi.ages[a].forEach(w => list.push(`${m} - ${a} - ${w}`));
            });
        });
    } else {
        DATA_TREE.Speed.mains.forEach(m => DATA_TREE.Speed.ages.forEach(a => list.push(`${m} - ${a}`)));
    }
    return list;
}

db.on('value', snap => { 
    store = snap.val() || {}; 
    if(Object.keys(store).length === 0) { console.log("Initializing database..."); } // Hệ thống tự động nhận diện danh mục
    initData(); 
});

function initData() {
    const sel = document.getElementById('catSelect');
    const list = getFullCategoryList(currentTab);
    sel.innerHTML = list.map(item => `<option value="${item}" ${current===item?'selected':''}>${item}</option>`).join('');
    if(!current) current = list[0];
    
    // Cập nhật VĐV & Sơ đồ
    const data = store[current] || { players: [] };
    document.getElementById('bulkInput').value = (data.players || []).map(p => `${p.name} - ${p.club}`).join('\n');
    renderGroups();
    updateTabUI();
}

function switchTab(t) { currentTab = t; current = ""; initData(); }
function switchCat() { current = document.getElementById('catSelect').value; initData(); }

function updateTabUI() {
    ['Poomsae', 'Kyorugi', 'Speed'].forEach(t => {
        document.getElementById('tab'+t).className = (t === currentTab) ? "px-6 py-2.5 rounded-xl font-black text-[10px] uppercase transition tab-active shadow-sm" : "px-6 py-2.5 rounded-xl font-black text-[10px] uppercase transition text-slate-400";
    });
}

// --- LOGIC ĐIỀU HÀNH ---
function importPlayers() {
    if(!isAdmin) return alert("Vui lòng Login Admin!");
    const players = document.getElementById('bulkInput').value.split('\n').filter(l => l.trim()).map(l => {
        let p = l.split('-'); return { name: p[0]?.trim().toUpperCase(), club: p[1]?.trim().toUpperCase() || 'ĐƠN VỊ' };
    });
    if(!store[current]) store[current] = {};
    store[current].players = players;
    db.child(current).update({ players: players });
    alert("Đã lưu danh sách!");
}

function generateGroups() {
    if(!isAdmin) return alert("Vui lòng Login Admin!");
    let data = store[current];
    if(!data || !data.players || data.players.length < 2) return alert("Cần tối thiểu 2 VĐV!");
    
    let p = [...data.players].sort(() => Math.random() - 0.5);
    let groups = [];
    let isSingleGroup = currentTab === 'Kyorugi';
    let size = isSingleGroup ? p.length : 4;

    for (let i = 0; i < p.length; i += size) {
        let chunk = p.slice(i, i + size);
        if (currentTab === 'Speed') {
            groups.push({ name: `NHÓM ${groups.length+1}`, type: 'speed', players: chunk.map(pl => ({...pl, score: 0})) });
        } else {
            let bracketSize = Math.pow(2, Math.ceil(Math.log2(chunk.length)));
            let pArr = Array(bracketSize).fill(null).map(() => ({ name: 'BYE', club: '-' }));
            chunk.forEach((pl, idx) => {
                let pos = 0, temp = idx;
                for(let j=0; j<Math.log2(bracketSize); j++) { pos = (pos << 1) | (temp & 1); temp >>= 1; }
                pArr[pos] = pl;
            });
            let r1 = [];
            for(let j=0; j<pArr.length; j+=2) {
                let m = { p1: pArr[j], p2: pArr[j+1], winner: null, matchNo: '' };
                if(m.p2.name==='BYE') m.winner=m.p1; else if(m.p1.name==='BYE') m.winner=m.p2;
                r1.push(m);
            }
            let bracket = [r1];
            while(bracket[bracket.length-1].length > 1) {
                let prev = bracket[bracket.length-1], next = [];
                for(let k=0; k<prev.length; k+=2) {
                    let m = { p1: prev[k].winner||{name:'?'}, p2: prev[k+1].winner||{name:'?'}, winner: null };
                    if(m.p1.name==='BYE') m.winner=m.p2; else if(m.p2.name==='BYE') m.winner=m.p1;
                    next.push(m);
                }
                bracket.push(next);
            }
            groups.push({ name: isSingleGroup ? "SƠ ĐỒ THI ĐẤU" : `NHÓM ${groups.length+1}`, type: 'bracket', rounds: bracket });
        }
    }
    db.child(current).update({ groups: groups });
}

function renderGroups() {
    const area = document.getElementById('displayArea');
    const medalArea = document.getElementById('medalList');
    area.innerHTML = ''; medalArea.innerHTML = '';
    const data = store[current];
    if(!data || !data.groups) return area.innerHTML = "<div class='p-20 text-center opacity-20 font-black text-2xl uppercase'>Chưa bốc thăm</div>";

    data.groups.forEach((g, gi) => {
        let div = document.createElement('div'); div.className = 'group-container';
        div.innerHTML = `<h3 class="font-black mb-6 uppercase italic border-b-2 border-slate-200 pb-2">${g.name}</h3>`;
        
        if(g.type === 'speed') {
            let s = [...g.players].sort((a,b) => b.score - a.score);
            let rows = g.players.map((p,pi) => `<div class="flex items-center gap-4 border-b py-2"><div class="flex-1 font-bold uppercase">${p.name}<div class="text-[9px] opacity-50">${p.club}</div></div><input type="number" class="w-16 border-2 border-blue-500 rounded text-center font-black" value="${p.score||0}" onchange="updateSpeed(${gi},${pi},this.value)"></div>`).join('');
            div.innerHTML += `<div class="grid md:grid-cols-2 gap-8">${rows}</div>`;
            if(s[0]?.score>0) medalArea.innerHTML += renderMedalTag(`Vàng - ${g.name}`, s[0]);
        } else {
            let bWrap = document.createElement('div'); bWrap.className = 'bracket-scroll';
            g.rounds.forEach((round, ri) => {
                let col = document.createElement('div'); col.className = 'round-column';
                round.forEach((m, mi) => {
                    col.innerHTML += `<div class="match-box">
                        <div class="match-number-box">${m.matchNo||''}</div>
                        <div class="player-line blue-side ${m.winner?.name===m.p1.name?'is-winner':''}" onclick="setWin(${gi},${ri},${mi},1)">${m.p1.name}<div class="text-[8px] opacity-50">${m.p1.club}</div></div>
                        <div class="player-line red-side ${m.winner?.name===m.p2.name?'is-winner':''}" onclick="setWin(${gi},${ri},${mi},2)">${m.p2.name}<div class="text-[8px] opacity-50">${m.p2.club}</div></div>
                    </div>`;
                });
                bWrap.appendChild(col);
            });
            div.appendChild(bWrap);
            let last = g.rounds[g.rounds.length-1][0];
            if(last.winner) medalArea.innerHTML += renderMedalTag(`Vàng - ${g.name}`, last.winner);
        }
        area.appendChild(div);
    });
}

function renderMedalTag(r, p) {
    return `<div class="medal-tag gold-bg"><span class="text-[9px] font-black opacity-50">${r}</span><span class="text-sm font-black uppercase">${p.name}</span><span class="text-[9px] italic">${p.club}</span></div>`;
}

function setWin(gi, ri, mi, pNum) {
    if(!isAdmin) return;
    let g = store[current].groups[gi], m = g.rounds[ri][mi];
    let win = pNum===1?m.p1:m.p2; if(win.name==='?'||win.name==='BYE') return;
    m.winner = win;
    if(g.rounds[ri+1]) { let nMi = Math.floor(mi/2); if(mi%2===0) g.rounds[ri+1][nMi].p1=win; else g.rounds[ri+1][nMi].p2=win; }
    db.child(current).update({ groups: store[current].groups });
}

function updateSpeed(gi, pi, val) {
    if(!isAdmin) return;
    store[current].groups[gi].players[pi].score = parseInt(val)||0;
    db.child(current).update({ groups: store[current].groups });
}

function resetData() { if(confirm("Xóa bốc thăm?")) db.child(current).child('groups').remove(); }

function toggleLogin() {
    if(!isAdmin && prompt("Pass:")==='123') { isAdmin=true; document.getElementById('mainBody').classList.add('admin-mode'); document.getElementById('loginBtn').innerText="ADMIN ON"; }
    else { isAdmin=false; document.getElementById('mainBody').classList.remove('admin-mode'); document.getElementById('loginBtn').innerText="Admin Login"; }
}

async function exportPNG() {
    const canvas = await html2canvas(document.getElementById('captureArea'), { scale: 2, useCORS: true });
    const link = document.createElement('a'); link.download = `${current}.png`; link.href = canvas.toDataURL(); link.click();
}
</script>
</body>
</html>
