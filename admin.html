<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEUNG RI 2026 - ADMIN ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .card-admin { background: #1e293b; border: 1px solid #334155; border-radius: 20px; }
        input, select { background: #334155 !important; border: 1px solid #475569 !important; color: white !important; border-radius: 10px; padding: 8px 12px; outline: none; }
        .tab-btn { transition: all 0.2s; opacity: 0.5; }
        .tab-btn.active { opacity: 1; background: #2563eb; color: white; }
        
        /* Style cho Sơ đồ bốc thăm */
        .bracket-scroll { display: flex; gap: 40px; padding: 20px; align-items: stretch; overflow-x: auto; }
        .round-column { display: flex; flex-direction: column; justify-content: space-around; min-width: 200px; }
        .match-box { position: relative; border-left: 4px solid #475569; padding-left: 10px; margin: 15px 0; min-height: 80px; display: flex; flex-direction: column; justify-content: center; background: rgba(255,255,255,0.02); border-radius: 0 8px 8px 0; }
        .player-line { height: 38px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; padding: 0 8px; font-size: 0.7rem; cursor: pointer; transition: all 0.2s; }
        .player-line:hover { background: rgba(37, 99, 235, 0.2); }
        .is-winner { background: rgba(34, 197, 94, 0.2); color: #4ade80; border-bottom-color: #22c55e; }
        .is-winner::after { content: "✔"; font-weight: bold; margin-left: 5px; }
        .match-no { position: absolute; left: -35px; top: 50%; transform: translateY(-50%); font-size: 10px; font-weight: 900; color: #64748b; }
    </style>
</head>
<body>

<div id="adminLogin" class="fixed inset-0 bg-slate-950 z-[200] flex items-center justify-center p-4">
    <div class="card-admin p-8 max-w-md w-full text-center">
        <h2 class="text-2xl font-black uppercase italic mb-6 text-blue-500 underline decoration-4">Admin Control</h2>
        <input type="password" id="adminPass" placeholder="Nhập mã quản trị" class="w-full mb-4 py-4 text-center text-xl tracking-[10px]">
        <button onclick="checkAdmin()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase hover:bg-blue-700 transition">Đăng nhập</button>
    </div>
</div>

<div class="max-w-[1800px] mx-auto p-4 md:p-6">
    <header class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-6 bg-[#1e293b] p-6 rounded-3xl border-b-4 border-blue-600 shadow-2xl">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black uppercase italic tracking-tighter">SEUNG RI <span class="text-blue-500">PRO-ADMIN</span></h1>
            <div id="dbStatus" class="text-[10px] font-bold uppercase opacity-50 italic">● Connecting...</div>
        </div>
        <nav class="flex bg-slate-800 p-1.5 rounded-2xl">
            <button onclick="showSection('users')" id="btn-users" class="tab-btn active px-5 py-2 rounded-xl text-[10px] font-black uppercase">Tài khoản</button>
            <button onclick="showSection('athletes')" id="btn-athletes" class="tab-btn px-5 py-2 rounded-xl text-[10px] font-black uppercase ml-2">Quản lý VĐV</button>
            <button onclick="showSection('draw')" id="btn-draw" class="tab-btn px-5 py-2 rounded-xl text-[10px] font-black uppercase ml-2 bg-red-900/30 text-red-400">Bốc thăm</button>
            <button onclick="showSection('brackets')" id="btn-brackets" class="tab-btn px-5 py-2 rounded-xl text-[10px] font-black uppercase ml-2 bg-green-900/30 text-green-400">Sơ đồ & Điều hành</button>
        </nav>
    </header>

    <div id="sec-users" class="space-y-6">
        <div class="card-admin p-6">
            <h2 class="text-lg font-black uppercase italic mb-4">Email & Mật khẩu các đoàn</h2>
            <div class="overflow-x-auto"><table class="w-full text-left"><tbody id="userTable"></tbody></table></div>
        </div>
    </div>

    <div id="sec-athletes" class="hidden space-y-6">
        <div class="flex gap-4"><button onclick="lockAll(true)" class="bg-red-600 px-4 py-2 rounded-lg text-xs font-bold uppercase">Khóa toàn bộ</button></div>
        <div class="card-admin p-6 overflow-x-auto"><table class="w-full text-left"><tbody id="athleteTable"></tbody></table></div>
    </div>

    <div id="sec-draw" class="hidden card-admin p-8 text-center">
        <h2 class="text-3xl font-black uppercase mb-4">Khởi tạo sơ đồ</h2>
        <button onclick="generateAllBrackets()" class="bg-blue-600 px-12 py-6 rounded-3xl font-black text-xl shadow-2xl hover:scale-105 transition uppercase">Xác nhận bốc thăm toàn giải</button>
    </div>

    <div id="sec-brackets" class="hidden space-y-6">
        <div class="flex flex-wrap items-center gap-4 bg-slate-800 p-4 rounded-2xl">
            <span class="text-[10px] font-black uppercase text-slate-400">Chọn nội dung điều hành:</span>
            <select id="catSelect" onchange="renderAdminBracket()" class="min-w-[300px]"></select>
            <div class="ml-auto text-[10px] font-bold text-amber-500 italic">* Click vào tên VĐV trên sơ đồ để chọn người thắng</div>
        </div>
        
        <div class="card-admin p-4 min-h-[600px] overflow-hidden">
            <div id="bracketContent" class="bracket-scroll">
                </div>
        </div>
    </div>
</div>

<script>
// --- CONFIG FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyC00bfXhy9CaF7xVbVqTtcfJqDQfGBechw",
    authDomain: "seungrichampionship-d3985.firebaseapp.com",
    databaseURL: "https://seungrichampionship-d3985-default-rtdb.asia-southeast1.firebasedatabase.app/",
    projectId: "seungrichampionship-d3985",
    storageBucket: "seungrichampionship-d3985.firebasestorage.app",
    messagingSenderId: "696543159443",
    appId: "1:696543159443:web:59f4c558600929f4ee1966"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
let allBrackets = {};

function checkAdmin() {
    if(document.getElementById('adminPass').value === "admin123") {
        document.getElementById('adminLogin').style.display = 'none';
        initAdmin();
    } else alert("Sai mật khẩu!");
}

function showSection(id) {
    ['users', 'athletes', 'draw', 'brackets'].forEach(s => document.getElementById('sec-'+s).classList.add('hidden'));
    document.getElementById('sec-'+id).classList.remove('hidden');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-'+id).classList.add('active');
}

// Logic bốc thăm tự động
async function generateAllBrackets() {
    if(!confirm("Bốc thăm sẽ xóa kết quả cũ! Tiếp tục?")) return;
    const snap = await db.ref('registrations_v3').once('value');
    const data = snap.val();
    if(!data) return alert("Không có VĐV!");

    const groups = {};
    Object.values(data).forEach(r => {
        const key = `${r.category} - ${r.subType}`;
        if(!groups[key]) groups[key] = [];
        groups[key].push({name: r.name, club: r.club});
    });

    for(let catName in groups) {
        const players = groups[catName].sort(() => Math.random() - 0.5);
        const bracket = buildBracket(players);
        await db.ref('brackets_v3/' + catName).set({ rounds: bracket });
    }
    alert("Đã bốc thăm xong!");
}

function buildBracket(players) {
    let size = Math.pow(2, Math.ceil(Math.log2(players.length)));
    if(size < 2) size = 2;
    let r1 = [];
    // Điền VĐV vào sơ đồ theo vị trí hạt giống (đơn giản hóa)
    for(let i=0; i<size; i+=2) {
        let p1 = players[i] || {name: 'BYE', club: '-'};
        let p2 = players[i+1] || {name: 'BYE', club: '-'};
        let m = { p1, p2, winner: null, matchNo: (i/2 + 1) };
        if(p2.name === 'BYE') m.winner = p1; else if(p1.name === 'BYE') m.winner = p2;
        r1.push(m);
    }
    let rounds = [r1];
    while(r1.length > 1) {
        let nextR = [];
        for(let j=0; j<r1.length; j+=2) {
            let m = { p1: r1[j].winner || {name: '?'}, p2: r1[j+1].winner || {name: '?'}, winner: null };
            if(m.p1.name === 'BYE' && m.p2.name !== '?') m.winner = m.p2;
            if(m.p2.name === 'BYE' && m.p1.name !== '?') m.winner = m.p1;
            nextR.push(m);
        }
        rounds.push(nextR);
        r1 = nextR;
    }
    return rounds;
}

// Render sơ đồ Admin và Điều hành
db.ref('brackets_v3').on('value', snap => {
    allBrackets = snap.val() || {};
    const sel = document.getElementById('catSelect');
    const currentVal = sel.value;
    sel.innerHTML = Object.keys(allBrackets).map(k => `<option value="${k}">${k}</option>`).join('');
    if(currentVal && allBrackets[currentVal]) sel.value = currentVal;
    renderAdminBracket();
});

function renderAdminBracket() {
    const cat = document.getElementById('catSelect').value;
    const area = document.getElementById('bracketContent');
    area.innerHTML = "";
    if(!cat || !allBrackets[cat]) return;

    allBrackets[cat].rounds.forEach((round, ri) => {
        const col = document.createElement('div');
        col.className = 'round-column';
        round.forEach((m, mi) => {
            const box = document.createElement('div');
            box.className = 'match-box';
            box.innerHTML = `<span class="match-no">#${m.matchNo || ''}</span>`;
            
            box.appendChild(createSlot(cat, ri, mi, 1, m.p1, m.winner));
            box.appendChild(createSlot(cat, ri, mi, 2, m.p2, m.winner));
            col.appendChild(box);
        });
        area.appendChild(col);
    });
}

function createSlot(cat, ri, mi, pNum, player, winner) {
    const div = document.createElement('div');
    const isWin = winner && winner.name === player.name && player.name !== 'BYE';
    div.className = `player-line ${isWin ? 'is-winner' : ''} ${player.name === 'BYE' ? 'opacity-20' : ''}`;
    div.innerHTML = `<span>${player.name}</span><span class="text-[8px] opacity-50">${player.club}</span>`;
    div.onclick = () => setWinner(cat, ri, mi, pNum);
    return div;
}

async function setWinner(cat, ri, mi, pNum) {
    const m = allBrackets[cat].rounds[ri][mi];
    if(m.p1.name === '?' || m.p2.name === '?') return;
    const winner = pNum === 1 ? m.p1 : m.p2;
    if(winner.name === 'BYE') return;

    allBrackets[cat].rounds[ri][mi].winner = winner;
    // Tiến vào vòng sau
    if(allBrackets[cat].rounds[ri+1]) {
        let nextMi = Math.floor(mi / 2);
        if(mi % 2 === 0) allBrackets[cat].rounds[ri+1][nextMi].p1 = winner;
        else allBrackets[cat].rounds[ri+1][nextMi].p2 = winner;
    }
    await db.ref('brackets_v3/' + cat).set(allBrackets[cat]);
}

function initAdmin() {
    loadUsers();
    loadAthletes();
}
// Các hàm phụ trợ loadUsers, loadAthletes giữ nguyên logic...
function loadUsers() {
    db.ref('users_v3').on('value', snap => {
        const table = document.getElementById('userTable'); table.innerHTML = "";
        if(!snap.val()) return;
        Object.keys(snap.val()).forEach(k => {
            table.innerHTML += `<tr class="border-b border-slate-800"><td class="p-4 font-bold text-blue-400">${k.replace(/,/g,'.')}</td><td class="p-4 font-mono text-amber-500">${snap.val()[k].pass}</td></tr>`;
        });
    });
}
function loadAthletes() {
    db.ref('registrations_v3').on('value', snap => {
        const table = document.getElementById('athleteTable'); table.innerHTML = "";
        if(!snap.val()) return;
        Object.keys(snap.val()).forEach(k => {
            const r = snap.val()[k];
            table.innerHTML += `<tr class="border-b border-slate-800"><td class="p-4 uppercase text-xs font-black">${r.name}</td><td class="p-4 text-xs font-bold text-blue-400">${r.club}</td><td class="p-4 text-[10px] opacity-60">${r.category} - ${r.subType}</td></tr>`;
        });
    });
}
</script>
</body>
</html>
