<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEUNG RI LIVE - ELITE ENGINE V9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; color: #0f172a; overflow-x: hidden; }
        .glass-card { background: white; border-radius: 24px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
        select, textarea, input { border: 2px solid #e2e8f0 !important; border-radius: 12px !important; padding: 10px 16px !important; outline: none !important; font-weight: 600; font-size: 13px; transition: all 0.2s; background: #ffffff; width: 100%; }
        select:focus, textarea:focus, input:focus { border-color: #2563eb !important; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1); }
        .tab-btn { font-weight: 700; color: #64748b; transition: all 0.3s; padding: 10px 20px; font-size: 11px; text-transform: uppercase; border-radius: 12px; }
        .tab-btn.active { background: #2563eb; color: white; shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2); }
        .match-box { position: relative; border-left: 4px solid #334155; padding-left: 14px; margin: 28px 0; min-height: 110px; display: flex; flex-direction: column; justify-content: center; }
        .match-no-container { position: absolute; left: -55px; top: 50%; transform: translateY(-50%); font-weight: 800; color: #1e40af; font-size: 15px; }
        .match-no-input { background: transparent !important; border: none !important; width: 32px !important; padding: 0 !important; text-align: center !important; color: #1e40af !important; font-weight: 900 !important; }
        .player-line { height: 50px; border-bottom: 2px solid #f1f5f9; display: flex; flex-direction: column; justify-content: center; padding: 0 12px; background: white; position: relative; cursor: pointer; }
        .blue-side { border-bottom: 3px solid #3b82f6 !important; }
        .red-side { border-bottom: 3px solid #ef4444 !important; }
        .is-winner { background: #f0f7ff; }
        .is-winner::after { content: "★ WIN"; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); color: #3b82f6; font-size: 10px; font-weight: 900; }
        .medal-card { padding: 12px 16px; border-radius: 16px; font-weight: 700; display: flex; align-items: center; gap: 12px; border: 1px solid transparent; margin-bottom: 8px; }
        .gold-card { background: #fffbeb; border-color: #fde68a; color: #92400e; }
        .silver-card { background: #f8fafc; border-color: #e2e8f0; color: #334155; }
        .bronze-card { background: #fff7ed; border-color: #fed7aa; color: #9a3412; }
        .court-label { background: #0f172a; color: white; padding: 4px 14px; border-radius: 10px; font-size: 11px; font-weight: 900; }
        #captureArea { padding: 40px; background: white; width: fit-content; min-width: 100%; border-radius: 40px; }
        .exporting .match-no-input { pointer-events: none; }
    </style>
</head>
<body>

<div id="authOverlay" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[999] flex items-center justify-center p-4">
    <div class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-md w-full text-center">
        <h2 class="text-3xl font-[900] text-slate-900 uppercase italic mb-2 tracking-tighter">SEUNG RI <span class="text-blue-600">LIVE</span></h2>
        <p class="text-slate-400 text-[10px] font-bold uppercase tracking-[0.3em] mb-10">Tournament Portal 2026</p>
        <div class="space-y-4 text-left">
            <input type="email" id="authEmail" placeholder="Email (HLV hoặc Admin)">
            <input type="password" id="authPass" placeholder="Mật khẩu">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-xl hover:bg-blue-700 transition-all">Đăng nhập</button>
        </div>
    </div>
</div>

<div id="mainUI" class="hidden max-w-[1900px] mx-auto p-4 md:p-8">
    <header class="bg-white p-6 rounded-[2.5rem] shadow-sm mb-8 flex flex-col xl:flex-row justify-between items-center gap-6 border-b-4 border-blue-600">
        <div class="flex items-center gap-8">
            <h1 class="text-2xl font-black text-slate-900 uppercase italic tracking-tighter">SEUNG RI <span class="text-blue-600">PRO</span></h1>
            <nav class="flex bg-slate-50 p-1.5 rounded-2xl">
                <button onclick="switchTab('Poomsae')" id="tabPoomsae" class="tab-btn active">Quyền</button>
                <button onclick="switchTab('Kyorugi')" id="tabKyorugi" class="tab-btn">Đối kháng</button>
                <button onclick="switchTab('Speed')" id="tabSpeed" class="tab-btn">Tốc độ</button>
                <button onclick="showCoachList()" id="tabCoach" class="tab-btn ml-2 !text-blue-600 border-l pl-4">Quản lý VĐV</button>
            </nav>
        </div>
        <div class="flex items-center gap-5">
            <div class="text-right border-r pr-5">
                <div id="userName" class="text-[11px] font-black uppercase text-slate-900 leading-none tracking-tighter">---</div>
                <div id="userRole" class="text-[9px] font-bold text-blue-500 uppercase mt-1 italic tracking-widest">---</div>
            </div>
            <button onclick="location.reload()" class="text-red-400 hover:text-red-600 font-bold text-[10px] uppercase">Thoát</button>
        </div>
    </header>

    <div class="grid lg:grid-cols-4 gap-10">
        <aside class="lg:col-span-1 space-y-6">
            <div id="regFormContainer" class="glass-card p-6 border-t-8 border-blue-600">
                <h3 class="text-[11px] font-black text-slate-900 uppercase mb-5 tracking-widest italic border-b pb-3">Đăng ký mới</h3>
                <div class="space-y-4">
                    <input type="text" id="regName" placeholder="Tên VĐV" class="uppercase !bg-slate-50">
                    <input type="text" id="regBirth" placeholder="Năm sinh (VD: 2015)" class="!bg-slate-50">
                    <select id="regMain" onchange="updateRegOptions()"></select>
                    <select id="regAge" onchange="updateRegOptions()"></select>
                    <select id="regSub"></select>
                    <button onclick="submitRegistration()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black text-[11px] uppercase shadow-lg shadow-blue-100 hover:bg-blue-700 transition-all">Gửi đăng ký</button>
                </div>
            </div>

            <div class="glass-card p-6 bg-slate-50/50 border-t-8 border-slate-900">
                <h3 class="text-[10px] font-black text-slate-900 uppercase mb-4 tracking-widest text-center">VĐV trong hạng cân này</h3>
                <div id="playerListView" class="space-y-2 max-h-[400px] overflow-y-auto pr-2"></div>
                
                <div id="adminPanel" class="hidden mt-6 pt-6 border-t-2 border-red-100 space-y-3">
                    <button onclick="generateGroups()" class="bg-red-500 text-white w-full py-4 rounded-xl font-black text-[11px] uppercase shadow-lg italic">Bốc thăm / DRAW</button>
                    <button onclick="resetData()" class="text-red-400 w-full py-2 text-[9px] font-black uppercase hover:underline text-center block">Xóa kết quả bốc thăm</button>
                </div>
            </div>
        </aside>

        <main class="lg:col-span-3">
            <div id="bracketView">
                <div class="bg-white p-5 rounded-[2rem] shadow-sm mb-8 flex flex-wrap items-center gap-6 border-l-[6px] border-slate-900">
                    <div class="flex-1 min-w-[300px]">
                        <span class="text-[10px] font-bold text-slate-400 uppercase mb-1 block italic">Hạng cân đang chọn:</span>
                        <select id="catSelect" onchange="switchCat()" class="!border-none !bg-slate-50 !text-sm !font-black"></select>
                    </div>
                    <div class="w-32">
                        <span class="text-[10px] font-bold text-slate-400 uppercase mb-1 block italic">Sân:</span>
                        <select id="courtSelect" onchange="updateGlobalCourt(this.value)" class="!bg-slate-900 !text-white !text-xs !font-bold"></select>
                    </div>
                    <button onclick="exportPNG()" class="bg-blue-600 text-white px-8 py-3 rounded-xl text-[11px] font-black uppercase shadow-lg">Export PNG</button>
                </div>
                <div id="captureArea"><div id="displayArea" class="space-y-20"></div></div>
            </div>

            <div id="coachListView" class="hidden glass-card p-10">
                <h2 class="text-xl font-black uppercase italic mb-8 border-b-4 border-blue-600 inline-block pb-1">Danh sách quân số CLB</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-[10px] font-black text-slate-400 uppercase border-b">
                                <th class="p-4">VĐV</th><th class="p-4">Năm sinh</th><th class="p-4">Nội dung</th><th class="p-4">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="coachTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
// --- CONFIG ---
const DATA_TREE = {
    Poomsae: {
        mains: ["Quyền Cá Nhân Nam", "Quyền Cá Nhân Nữ", "Quyền Đôi Nam Nữ", "Quyền Đồng Đội Nam", "Quyền Đồng Đội Nữ"],
        ages_ind: ["Nhóm 1 (Sinh 2018+)", "Nhóm 2 (2017-2016)", "Nhóm 3 (2015-2014)", "Nhóm 4 (2013-2012)", "Nhóm 5 (2011-2010)", "Nhóm 6 (2009-1996)", "Nhóm 7 (1995-1986)", "Nhóm 8 (1985-)"],
        belts_ind: ["Trắng", "Vàng", "Xanh Lá", "Xanh Dương", "Đỏ", "Đỏ 1-2-3", "Đỏ Đen/Đen"],
        ages_grp: ["Dưới 10 tuổi", "11-14 tuổi", "15-30 tuổi", "Trên 31 tuổi"],
        belts_grp: ["Trắng/Vàng/Xanh lá", "Xanh dương/Đỏ", "Đỏ đen/Đen"]
    },
    Kyorugi: {
        mains: ["Đối kháng Nam", "Đối kháng Nữ"],
        ages: ["Dưới 11 tuổi", "12-14 tuổi", "15-17 tuổi"],
        weights: {
            "Dưới 11 tuổi": ["25kg", "28kg", "31kg", "34kg", "38kg", "42kg", "Trên 42kg"],
            "12-14 tuổi": ["33kg", "37kg", "41kg", "44kg", "47kg", "51kg", "55kg", "59kg", "Trên 59kg"],
            "15-17 tuổi": ["42kg", "44kg", "46kg", "49kg", "52kg", "55kg", "59kg", "63kg", "68kg", "Trên 68kg"]
        }
    },
    Speed: { 
        mains: ["Đá tống trước Nam", "Đá tống trước Nữ", "Đá Vòng Cầu Nam", "Đá Vòng Cầu Nữ", "Đấm Nam", "Đấm Nữ"], 
        ages: ["Dưới 4 tuổi", "5 - 6 tuổi", "7 - 8 tuổi", "9 - 10 tuổi", "11 - 12 tuổi", "13 - 14 tuổi", "15 - 17 tuổi", "Trên 18 tuổi"]
    }
};

const firebaseConfig = {
    apiKey: "AIzaSyBhN3Riezh-Ka20Salm1COtFbW9UdCLRdM",
    authDomain: "seungrichampionship-90984.firebaseapp.com",
    databaseURL: "https://seungrichampionship-90984-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "seungrichampionship-90984",
    storageBucket: "seungrichampionship-90984.firebasestorage.app",
    messagingSenderId: "1031691130771",
    appId: "1:1031691130771:web:1dc2ade7290b60f9d87a66"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("seungri_final_v6");
let store = {}, currentTab = 'Poomsae', current = "", userData = null;

// --- LOGIN ---
async function handleLogin() {
    const email = document.getElementById('authEmail').value.trim().toLowerCase();
    const pass = document.getElementById('authPass').value.trim();
    if(!email || !pass) return alert("Nhập đủ Email và Pass");
    const key = email.replace(/\./g, ',');

    if(email === 'admin@seungri.com' && pass === 'admin123') {
        userData = { role: 'admin', email: email, club: 'BAN TỔ CHỨC' };
    } else {
        const snap = await firebase.database().ref("users_v6").child(key).once('value');
        if(snap.exists()) {
            if(snap.val().pass !== pass) return alert("Sai mật khẩu");
            userData = { role: 'coach', email: email, club: snap.val().club };
        } else {
            const club = prompt("Nhập tên Đơn vị của bạn:");
            if(!club) return;
            await firebase.database().ref("users_v6").child(key).set({ pass, club });
            userData = { role: 'coach', email: email, club: club };
        }
    }
    document.getElementById('authOverlay').style.display = 'none';
    document.getElementById('mainUI').classList.remove('hidden');
    document.getElementById('userName').innerText = userData.email;
    document.getElementById('userRole').innerText = userData.club;

    if(userData.role === 'admin') {
        document.getElementById('regFormContainer').style.display = 'none';
        document.getElementById('adminPanel').classList.remove('hidden');
        document.getElementById('tabCoach').style.display = 'none';
    }
    updateRegOptions();
    db.on('value', snap => { store = snap.val() || {}; initData(); });
}

// --- LOGIC ĐĂNG KÝ VĐV ---
function updateRegOptions() {
    const mSel = document.getElementById('regMain');
    const aSel = document.getElementById('regAge');
    const sSel = document.getElementById('regSub');
    if(mSel.options.length === 0) {
        let all = [...DATA_TREE.Poomsae.mains, ...DATA_TREE.Kyorugi.mains, ...DATA_TREE.Speed.mains];
        mSel.innerHTML = all.map(m => `<option value="${m}">${m}</option>`).join('');
    }
    const m = mSel.value;
    if(m.includes('Quyền')) {
        let ages = m.includes('Cá Nhân') ? DATA_TREE.Poomsae.ages_ind : DATA_TREE.Poomsae.ages_grp;
        aSel.innerHTML = ages.map(a => `<option value="${a}">${a}</option>`).join('');
        let belts = m.includes('Cá Nhân') ? DATA_TREE.Poomsae.belts_ind : DATA_TREE.Poomsae.belts_grp;
        sSel.innerHTML = belts.map(b => `<option value="${b}">${b}</option>`).join('');
    } else if(m.includes('Đối kháng')) {
        aSel.innerHTML = DATA_TREE.Kyorugi.ages.map(a => `<option value="${a}">${a}</option>`).join('');
        sSel.innerHTML = DATA_TREE.Kyorugi.weights[aSel.value].map(w => `<option value="${w}">${w}</option>`).join('');
    } else {
        aSel.innerHTML = DATA_TREE.Speed.ages.map(a => `<option value="${a}">${a}</option>`).join('');
        sSel.innerHTML = '<option value="Mặc định">Mặc định</option>';
    }
}

function submitRegistration() {
    const name = document.getElementById('regName').value.trim().toUpperCase();
    const birth = document.getElementById('regBirth').value.trim();
    if(!name || !birth) return alert("Thiếu Tên hoặc Năm sinh!");
    const catKey = document.getElementById('regMain').value.includes('Speed') ? `${document.getElementById('regMain').value} - ${document.getElementById('regAge').value}` : `${document.getElementById('regMain').value} - ${document.getElementById('regAge').value} - ${document.getElementById('regSub').value}`;
    if(!store[catKey]) store[catKey] = { players: [], groups: [] };
    store[catKey].players.push({ name, birth, club: userData.club, ownerEmail: userData.email });
    db.child(catKey).update({ players: store[catKey].players });
    document.getElementById('regName').value = ""; document.getElementById('regBirth').value = "";
    current = catKey; initData(); alert("Đăng ký thành công!");
}

// --- QUẢN LÝ DANH SÁCH (CHO CẢ ADMIN & HLV) ---
function renderPlayerList() {
    const listDiv = document.getElementById('playerListView'); listDiv.innerHTML = "";
    const players = store[current]?.players || [];
    players.forEach((p, idx) => {
        const canDelete = userData.role === 'admin' || p.ownerEmail === userData.email;
        listDiv.innerHTML += `
            <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-slate-100 shadow-sm">
                <div>
                    <div class="text-[11px] font-black uppercase">${p.name}</div>
                    <div class="text-[9px] font-bold text-blue-500 uppercase italic">${p.club} | ${p.birth || ''}</div>
                </div>
                ${canDelete ? `<div class="flex gap-1">
                    <button onclick="editPlayerInList('${current}', ${idx})" class="text-blue-400 hover:text-blue-600 font-bold p-2 text-xs">✎</button>
                    <button onclick="removePlayerInList('${current}', ${idx})" class="text-red-300 hover:text-red-600 font-bold p-2 text-xs">✕</button>
                </div>` : ''}
            </div>`;
    });
}

function removePlayerInList(cat, idx) {
    if(confirm("Xóa VĐV này?")) {
        store[cat].players.splice(idx, 1);
        db.child(cat).update({ players: store[cat].players });
    }
}

function editPlayerInList(cat, idx) {
    const p = store[cat].players[idx];
    const newName = prompt("Sửa tên VĐV:", p.name);
    const newBirth = prompt("Sửa năm sinh:", p.birth);
    if(newName) {
        store[cat].players[idx].name = newName.toUpperCase();
        store[cat].players[idx].birth = newBirth;
        db.child(cat).update({ players: store[cat].players });
    }
}

function showCoachList() {
    document.getElementById('bracketView').classList.add('hidden');
    document.getElementById('coachListView').classList.remove('hidden');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tabCoach').classList.add('active');
    const body = document.getElementById('coachTableBody'); body.innerHTML = "";
    Object.keys(store).forEach(catKey => {
        (store[catKey].players || []).forEach((p, idx) => {
            if(p.ownerEmail === userData.email) {
                body.innerHTML += `<tr class="border-b border-slate-50">
                    <td class="p-4 font-black uppercase text-sm">${p.name}</td>
                    <td class="p-4 font-bold">${p.birth || ''}</td>
                    <td class="p-4 text-xs text-blue-600 font-bold">${catKey}</td>
                    <td class="p-4"><button onclick="removePlayerInList('${catKey}', ${idx})" class="text-red-500 border px-3 py-1 rounded-lg text-xs font-black">XÓA</button></td>
                </tr>`;
            }
        });
    });
}

// --- RENDER SƠ ĐỒ ---
function initData() {
    const sel = document.getElementById('catSelect');
    const list = Object.keys(DATA_TREE).flatMap(tab => getFullCategoryList(tab));
    const oldVal = sel.value;
    sel.innerHTML = list.map(item => `<option value="${item}">${item}</option>`).join('');
    if(!current) current = (oldVal && list.includes(oldVal)) ? oldVal : list[0];
    sel.value = current;
    const catData = store[current] || {};
    document.getElementById('courtSelect').innerHTML = [1,2,3].map(c => `<option value="${c}" ${catData.court==String(c)?'selected':''}>SÂN ${c}</option>`).join('');
    renderPlayerList(); renderGroups();
}

function getFullCategoryList(tab) {
    let list = [];
    if(tab === 'Poomsae') { DATA_TREE.Poomsae.mains.forEach(m => { let ages = m.includes('Cá Nhân') ? DATA_TREE.Poomsae.ages_ind : DATA_TREE.Poomsae.ages_grp; let belts = m.includes('Cá Nhân') ? DATA_TREE.Poomsae.belts_ind : DATA_TREE.Poomsae.belts_grp; ages.forEach(a => belts.forEach(b => list.push(`${m} - ${a} - ${b}`))); }); }
    else if(tab === 'Kyorugi') { DATA_TREE.Kyorugi.mains.forEach(m => { DATA_TREE.Kyorugi.ages.forEach(a => { DATA_TREE.Kyorugi.weights[a].forEach(w => list.push(`${m} - ${a} - ${w}`)); }); }); }
    else { DATA_TREE.Speed.mains.forEach(m => DATA_TREE.Speed.ages.forEach(a => list.push(`${m} - ${a}`))); }
    return list;
}

function renderGroups() {
    const area = document.getElementById('displayArea'); area.innerHTML = '';
    const data = store[current];
    if(!data?.groups) return area.innerHTML = "<div class='p-20 text-center opacity-20 font-black text-2xl uppercase italic'>Chưa bốc thăm</div>";
    data.groups.forEach((g, gi) => {
        let div = document.createElement('div'); div.className = 'p-10 relative border-b border-slate-100 last:border-0';
        div.innerHTML = `<div class="flex items-center gap-6 mb-10 pb-6 border-b-2 border-slate-50"><span class="court-label">SÂN ${data.court || 1}</span><h3 class="font-[900] uppercase italic text-2xl text-slate-800">${g.name} - ${current}</h3></div>`;
        if(g.type === 'speed') {
            let sorted = [...g.players].sort((a,b) => b.score - a.score);
            let playerRows = g.players.map((p,pi) => `<div class="flex items-center gap-8 border-b border-slate-50 py-5"><div class="flex-1"><div class="text-[16px] font-[900] uppercase text-slate-900">${p.name}</div><div class="text-[10px] font-bold text-blue-500 uppercase mt-1 italic">${p.club}</div></div><input type="number" class="w-24 border-2 border-slate-100 rounded-2xl text-center font-black p-3 bg-slate-50 text-blue-600" value="${p.score||0}" ${userData.role!=='admin'?'disabled':''} onchange="updateSpeed(${gi},${pi},this.value)"></div>`).join('');
            div.innerHTML += `<div class="flex flex-col xl:flex-row gap-16"><div class="flex-1">${playerRows}</div><div class="w-80 bg-slate-50/50 p-8 rounded-[2.5rem] border border-white space-y-4">${renderMedalCard('🥇 VÀNG', sorted[0]?.score>0?sorted[0]:null, 'gold')}${renderMedalCard('🥈 BẠC', sorted[1]?.score>0?sorted[1]:null, 'silver')}${renderMedalCard('🥉 ĐỒNG', sorted[2]?.score>0?sorted[2]:null, 'bronze')}${renderMedalCard('🥉 ĐỒNG', sorted[3]?.score>0?sorted[3]:null, 'bronze')}</div></div>`;
        } else {
            let bWrap = document.createElement('div'); bWrap.className = 'bracket-scroll';
            g.rounds.forEach((round, ri) => {
                let col = document.createElement('div'); col.className = 'round-column';
                let rLabel = (ri === g.rounds.length - 1) ? 'Chung kết' : (ri === g.rounds.length - 2) ? 'Bán kết' : 'Vòng loại';
                round.forEach((m, mi) => {
                    col.innerHTML += `<div class="match-box"><div class="match-no-container">(${userData.role==='admin' ? `<input type="text" class="match-no-input" value="${m.matchNo||''}" onchange="updateMatchNo(${gi},${ri},${mi},this.value)">` : `<span>${m.matchNo||''}</span>`})</div><div class="player-line blue-side ${m.winner?.name===m.p1.name?'is-winner':''}" onclick="setWin(${gi},${ri},${mi},1)"><span class="text-[13px] font-[900] uppercase text-slate-800">${m.p1.name}</span><span class="text-[9px] font-bold text-slate-400 uppercase italic">${m.p1.club}</span></div><div class="player-line red-side ${m.winner?.name===m.p2.name?'is-winner':''}" onclick="setWin(${gi},${ri},${mi},2)"><span class="text-[13px] font-[900] uppercase text-slate-800">${m.p2.name}</span><span class="text-[9px] font-bold text-slate-400 uppercase italic">${m.p2.club}</span></div></div>`;
                });
                bWrap.appendChild(col);
            });
            let last = g.rounds[g.rounds.length-1][0], gold = last.winner, silver = gold ? (gold.name===last.p1.name?last.p2:last.p1) : null;
            let semi = g.rounds.length>=2?g.rounds[g.rounds.length-2]:[], b1 = semi[0]?.winner ? (semi[0].winner.name===semi[0].p1.name?semi[0].p2:semi[0].p1):null, b2 = semi[1]?.winner ? (semi[1].winner.name===semi[1].p1.name?semi[1].p2:semi[1].p1):null;
            bWrap.innerHTML += `<div class="min-w-[260px] ml-12 flex flex-col justify-center space-y-3"><h4 class="text-[11px] font-[900] text-blue-600 mb-2 uppercase tracking-widest text-center border-b pb-2">Huy chương</h4>${renderMedalCard('🥇 VÀNG', gold, 'gold')}${renderMedalCard('🥈 BẠC', (silver&&silver.name!=='?')?silver:null, 'silver')}${renderMedalCard('🥉 ĐỒNG', (b1&&b1.name!=='BYE'&&b1.name!=='?')?b1:null, 'bronze')}${renderMedalCard('🥉 ĐỒNG', (b2&&b2.name!=='BYE'&&b2.name!=='?')?b2:null, 'bronze')}</div>`;
            div.appendChild(bWrap);
        }
        area.appendChild(div);
    });
}

function renderMedalCard(rank, p, type) { if(!p || p.name === '?' || p.name === 'BYE') return `<div class="medal-card opacity-10 border-slate-100 bg-white">---</div>`; return `<div class="medal-card ${type==='gold'?'gold-card':type==='silver'?'silver-card':'bronze-card'}"><span>${rank.split(' ')[0]}</span><div><div class="text-[13px] font-[900] uppercase leading-tight">${p.name}</div><div class="text-[9px] font-bold opacity-70 mt-0.5">${p.club}</div></div></div>`; }
function switchTab(t) { currentTab = t; current = ""; document.getElementById('bracketView').classList.remove('hidden'); document.getElementById('coachListView').classList.add('hidden'); updateTabUI(); initData(); }
function switchCat() { current = document.getElementById('catSelect').value; initData(); }
function updateTabUI() { document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === 'tab'+currentTab)); }
function updateGlobalCourt(val) { if(userData.role!=='admin') return; db.child(current).update({ court: val }); }
function setWin(gi, ri, mi, pNum) { if(userData.role!=='admin') return; let g = store[current].groups[gi], m = g.rounds[ri][mi], win = pNum===1?m.p1:m.p2; if(win.name==='?'||win.name==='BYE') return; m.winner = (m.winner?.name === win.name) ? null : win; if(g.rounds[ri+1]) { let nMi = Math.floor(mi / 2); if(mi%2===0) g.rounds[ri+1][nMi].p1=m.winner||{name:'?'}; else g.rounds[ri+1][nMi].p2=m.winner||{name:'?'}; } db.child(current).update({ groups: store[current].groups }); }
function updateSpeed(gi, pi, val) { if(userData.role!=='admin') return; store[current].groups[gi].players[pi].score = parseInt(val)||0; db.child(current).update({ groups: store[current].groups }); }
function updateMatchNo(gi, ri, mi, val) { if(userData.role!=='admin') return; store[current].groups[gi].rounds[ri][mi].matchNo = val; db.child(current).update({ groups: store[current].groups }); }
function resetData() { if(userData.role!=='admin') return; if(confirm("Xóa?")) db.child(current).child('groups').remove(); }
function generateGroups() { if(userData.role !== 'admin') return; let data = store[current]; if(!data?.players || data.players.length < 2) return alert("Cần 2 VĐV!"); let p = [...data.players].sort(() => Math.random() - 0.5); let groups = []; let size = (currentTab === 'Kyorugi') ? p.length : 4; for (let i = 0; i < p.length; i += size) { let chunk = p.slice(i, i + size); if (currentTab === 'Speed') groups.push({ name: `NHÓM ${groups.length+1}`, type: 'speed', players: chunk.map(pl => ({...pl, score: 0})) }); else { let bSize = Math.pow(2, Math.ceil(Math.log2(chunk.length))); let pArr = Array(bSize).fill(null).map(() => ({ name: 'BYE', club: '-' })); chunk.forEach((pl, idx) => { let pos = 0, temp = idx; for(let j=0; j<Math.log2(bSize); j++) { pos = (pos << 1) | (temp & 1); temp >>= 1; } pArr[pos] = pl; }); let r1 = []; for(let j=0; j<pArr.length; j+=2) { let m = { p1: pArr[j], p2: pArr[j+1], winner: null, matchNo: '' }; if(m.p2.name==='BYE') m.winner=m.p1; else if(m.p1.name==='BYE') m.winner=m.p2; r1.push(m); } let bracket = [r1]; while(bracket[bracket.length-1].length > 1) { let prev = bracket[bracket.length-1], next = []; for(let k=0; k<prev.length; k+=2) next.push({ p1: prev[k].winner||{name:'?'}, p2: prev[k+1].winner||{name:'?'}, winner: null, matchNo: '' }); bracket.push(next); } groups.push({ name: currentTab==='Kyorugi' ? "SƠ ĐỒ ĐỐI KHÁNG" : `NHÓM ${groups.length+1}`, type: 'bracket', rounds: bracket }); } } db.child(current).update({ groups: groups }); }

async function exportPNG() {
    const area = document.getElementById('captureArea'); const btn = document.getElementById('exportBtn');
    btn.innerText = "Dựng ảnh..."; btn.disabled = true;
    area.classList.add('exporting');
    try {
        const canvas = await html2canvas(area, { scale: 3, useCORS: true, backgroundColor: "#ffffff" });
        const link = document.createElement('a'); link.download = `${current}.png`; link.href = canvas.toDataURL("image/png"); link.click();
    } catch (e) { alert("Lỗi Export."); } finally { area.classList.remove('exporting'); btn.innerText = "Export PNG"; btn.disabled = false; }
}
</script>
