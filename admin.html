<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEUNG RI 2026 - ADMIN PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0b0f19; color: #f1f5f9; overflow-x: hidden; }
        .admin-card { background: #161d2f; border: 1px solid #232d45; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }
        input, select { background: #1f2937 !important; border: 1px solid #374151 !important; color: white !important; border-radius: 10px; padding: 10px 15px; outline: none; }
        .tab-main.active { background: #2563eb; color: white; box-shadow: 0 0 20px rgba(37, 99, 235, 0.4); }
        .sub-tab.active { background: #334155; border-color: #64748b; }
        .bracket-scroll { display: flex; gap: 60px; padding: 60px 20px; align-items: stretch; overflow-x: auto; }
        .round-column { display: flex; flex-direction: column; justify-content: space-around; min-width: 260px; position: relative; }
        .round-name { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); font-weight: 900; color: #3b82f6; text-transform: uppercase; font-size: 10px; white-space: nowrap; }
        .match-box { position: relative; border-left: 4px solid #3b82f6; padding-left: 12px; margin: 25px 0; min-height: 90px; display: flex; flex-direction: column; justify-content: center; background: rgba(255,255,255,0.02); border-radius: 0 10px 10px 0; }
        .player-line { height: 42px; border-bottom: 1px solid #1f2937; display: flex; align-items: center; justify-content: space-between; padding: 0 10px; font-size: 0.7rem; cursor: pointer; transition: 0.2s; }
        .is-winner { background: rgba(220, 38, 38, 0.2) !important; color: #f87171 !important; border-bottom-color: #dc2626 !important; font-weight: 900; }
        .is-loss { opacity: 0.3; }
        .match-no-label { position: absolute; left: -55px; top: 50%; transform: translateY(-50%); font-weight: 900; color: #3b82f6; font-size: 10px; }
        .match-no-input { width: 35px; background: #1e293b !important; border: 1px solid #334155 !important; color: #fff !important; text-align: center; font-size: 10px; border-radius: 4px; padding: 2px !important; }
        .score-input { width: 45px; background: #1e293b !important; border: none !important; text-align: center; font-weight: 900; color: #fbbf24 !important; border-radius: 6px; font-size: 12px; }
        .medal-tag { padding: 10px; border-radius: 12px; font-weight: 800; display: flex; align-items: center; gap: 10px; border-left: 5px solid #ddd; margin-bottom: 6px; }
        .gold { background: linear-gradient(to right, #45371c, #161d2f); border-color: #fbbf24; color: #fbbf24; }
        .silver { background: linear-gradient(to right, #334155, #161d2f); border-color: #94a3b8; color: #cbd5e1; }
        .bronze { background: linear-gradient(to right, #432b1e, #161d2f); border-color: #b45309; color: #d97706; }
    </style>
</head>
<body>

<div id="loginOverlay" class="fixed inset-0 bg-slate-950 z-[999] flex items-center justify-center p-4">
    <div class="admin-card p-10 max-w-md w-full text-center">
        <h2 class="text-3xl font-black uppercase italic mb-8">ADMIN ACCESS</h2>
        <input type="password" id="passInput" class="w-full mb-4 py-4 text-center text-2xl tracking-[10px]" placeholder="••••••">
        <button onclick="checkAdminPass()" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase shadow-lg">Unlock Dashboard</button>
    </div>
</div>

<div class="max-w-[1850px] mx-auto p-4 md:p-6">
    <header class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-6 p-6 admin-card border-b-4 border-blue-600">
        <div class="flex items-center gap-5">
            <h1 class="text-2xl font-black italic tracking-tighter uppercase">Seung Ri <span class="text-blue-500 underline">Tournament</span></h1>
            <div id="status" class="text-[10px] font-black uppercase text-green-500 flex items-center gap-2">
                <span id="db-indicator" class="w-2 h-2 bg-red-500 rounded-full"></span> <span id="db-text">OFFLINE</span>
            </div>
        </div>
        <nav class="flex bg-slate-900 p-1.5 rounded-2xl">
            <button onclick="switchMain('accounts')" id="tab-accounts" class="tab-main active px-6 py-2.5 rounded-xl font-black text-[10px] uppercase transition">Tài khoản</button>
            <button onclick="switchMain('manage')" id="tab-manage" class="tab-main px-6 py-2.5 rounded-xl font-black text-[10px] uppercase transition ml-2">Quản lý</button>
            <button onclick="switchMain('control')" id="tab-control" class="tab-main px-6 py-2.5 rounded-xl font-black text-[10px] uppercase transition ml-2 bg-red-600/10 text-red-500">Điều hành</button>
        </nav>
    </header>

    <div id="sec-accounts" class="space-y-6">
        <div class="admin-card p-8">
            <h2 class="text-xl font-black uppercase italic mb-6 border-b border-slate-800 pb-4">Tài khoản đơn vị</h2>
            <div class="overflow-x-auto"><table class="w-full text-left font-bold text-sm divide-y divide-slate-800"><tbody id="userListBody"></tbody></table></div>
        </div>
    </div>

    <div id="sec-manage" class="hidden space-y-6">
        <div class="flex flex-wrap gap-4 mb-2">
            <button onclick="setGlobalLock(true)" class="bg-red-600 px-6 py-3 rounded-xl font-black text-[10px] uppercase">Khóa sửa toàn bộ</button>
            <button onclick="setGlobalLock(false)" class="bg-green-600 px-6 py-3 rounded-xl font-black text-[10px] uppercase">Mở khóa toàn bộ</button>
            <button onclick="exportData()" class="bg-blue-600 px-6 py-3 rounded-xl font-black text-[10px] uppercase">Xuất Excel</button>
        </div>
        <div class="admin-card p-8">
            <input type="text" id="searchVdv" oninput="renderAthleteTable()" placeholder="Tìm tên..." class="w-full mb-6">
            <div class="overflow-x-auto"><table class="w-full text-left font-bold text-xs"><tbody id="athleteTableBody" class="divide-y divide-slate-800"></tbody></table></div>
        </div>
    </div>

    <div id="sec-control" class="hidden space-y-6">
        <div class="flex bg-slate-900 p-1.5 rounded-2xl w-fit">
            <button onclick="switchSub('Kyorugi')" id="sub-Kyorugi" class="sub-tab active px-8 py-2.5 rounded-xl font-black text-[10px] uppercase transition">Đối kháng</button>
            <button onclick="switchSub('Poomsae')" id="sub-Poomsae" class="sub-tab px-8 py-2.5 rounded-xl font-black text-[10px] uppercase transition ml-2">Quyền</button>
            <button onclick="switchSub('Speed')" id="sub-Speed" class="sub-tab px-8 py-2.5 rounded-xl font-black text-[10px] uppercase transition ml-2">Tốc độ</button>
        </div>

        <div class="grid lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-6">
                <div class="admin-card p-6 border-t-4 border-red-600">
                    <label class="text-[10px] font-black uppercase text-slate-500 mb-2 block italic">Chọn nội dung:</label>
                    <select id="bracketSelect" onchange="loadCurrentBracket()" class="w-full mb-4"></select>
                    
                    <div id="waitlistArea" class="mb-4 bg-slate-950/50 p-3 rounded-xl border border-slate-800 hidden">
                        <h4 class="text-[10px] font-black uppercase text-amber-500 mb-2 underline">VĐV chờ bốc thăm (<span id="waitCount">0</span>)</h4>
                        <div id="waitNames" class="text-[10px] space-y-1 opacity-70"></div>
                    </div>

                    <button onclick="handleManualDraw()" class="w-full bg-red-600 py-3 rounded-xl font-black uppercase text-[10px] mb-2 shadow-lg">Bốc thăm / Chia nhóm mới</button>
                    <button onclick="updateNewAthletes()" class="w-full bg-blue-600 py-3 rounded-xl font-black uppercase text-[10px]">Cập nhật VĐV mới</button>
                </div>
                
                <div class="admin-card p-6">
                    <h3 class="text-xs font-black uppercase text-slate-500 mb-4 tracking-widest italic">🥇 Huy chương</h3>
                    <div id="medalList" class="space-y-2"></div>
                </div>
            </div>

            <div class="lg:col-span-3 admin-card min-h-[800px] relative overflow-hidden bg-[#0e1422]">
                <div id="bracketContent" class="bracket-scroll"></div>
                <div id="speedContent" class="hidden p-8">
                     <table class="w-full text-left">
                        <thead class="text-[10px] uppercase text-slate-500 border-b border-slate-800">
                            <tr><th class="p-4">VĐV</th><th class="p-4">Đơn vị</th><th class="p-4">Thành tích</th><th class="p-4">Hạng</th></tr>
                        </thead>
                        <tbody id="speedTableBody"></tbody>
                     </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// --- CONFIG FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyBhN3Riezh-Ka20Salm1COtFbW9UdCLRdM",
    authDomain: "seungrichampionship-90984.firebaseapp.com",
    databaseURL: "https://seungrichampionship-90984-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "seungrichampionship-90984",
    storageBucket: "seungrichampionship-90984.firebasestorage.app",
    messagingSenderId: "1031691130771",
    appId: "1:1031691130771:web:1dc2ade7290b60f9d87a66"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let currentSubTab = "Kyorugi";
let allAthletes = {};
let allUsers = {};
let allBrackets = {};
let isUpdating = false;

db.ref('.info/connected').on('value', (s) => {
    const ind = document.getElementById('db-indicator');
    const txt = document.getElementById('db-text');
    if (s.val()) {
        ind.className = "w-2 h-2 bg-green-500 rounded-full animate-pulse";
        txt.innerText = "SYSTEM ONLINE"; txt.className = "text-green-500";
    }
});

function checkAdminPass() {
    if(document.getElementById('passInput').value === "admin123") {
        document.getElementById('loginOverlay').style.display = 'none';
        init();
    } else alert("Mật khẩu sai!");
}

function init() {
    db.ref('seungri_v2026/users').on('value', s => { allUsers = s.val() || {}; renderUserTable(); });
    db.ref('seungri_v2026/registrations').on('value', s => { 
        allAthletes = s.val() || {}; 
        renderAthleteTable(); 
        updateBracketSelectors(); 
    });
    db.ref('seungri_v2026/brackets').on('value', s => { 
        allBrackets = s.val() || {}; 
        loadCurrentBracket(); 
    });
}

function switchMain(id) {
    ['accounts', 'manage', 'control'].forEach(s => document.getElementById('sec-'+s).classList.add('hidden'));
    document.getElementById('sec-'+id).classList.remove('hidden');
    document.querySelectorAll('.tab-main').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
}

function switchSub(id) {
    currentSubTab = id;
    document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
    document.getElementById('sub-'+id).classList.add('active');
    updateBracketSelectors();
}

function updateBracketSelectors() {
    const sel = document.getElementById('bracketSelect');
    const cats = new Set();
    Object.values(allAthletes).forEach(r => { if(r.category === currentSubTab) cats.add(r.subType); });
    const currentVal = sel.value;
    sel.innerHTML = Array.from(cats).sort().map(c => `<option value="${c}">${c}</option>`).join('');
    if(currentVal && cats.has(currentVal)) sel.value = currentVal;
    loadCurrentBracket();
}

// BỐC THĂM TỔNG HỢP
async function handleManualDraw() {
    const subType = document.getElementById('bracketSelect').value;
    if(!subType) return;
    if(!confirm(`Xác nhận bốc thăm/chia nhóm mới cho: ${subType}? Kết quả cũ sẽ bị xóa!`)) return;

    const participants = Object.values(allAthletes).filter(r => r.category === currentSubTab && r.subType === subType);
    if(participants.length < 2) return alert("Cần tối thiểu 2 VĐV!");

    const shuffled = participants.sort(() => Math.random() - 0.5);

    if(currentSubTab === 'Speed') {
        const groups = [];
        for (let i = 0; i < shuffled.length; i += 4) {
            groups.push({ groupId: Math.floor(i/4) + 1, players: shuffled.slice(i, i + 4).map(p => ({name: p.name, club: p.club, score: 0, rank: ''})) });
        }
        await db.ref(`seungri_v2026/brackets/Speed - ${subType}`).set({ type: 'Speed', groups });
    } else if(currentSubTab === 'Poomsae') {
        const pGroups = [];
        for (let i = 0; i < shuffled.length; i += 4) {
            const rounds = buildKnockoutRounds(shuffled.slice(i, i + 4));
            pGroups.push({ groupId: Math.floor(i/4) + 1, rounds: rounds });
        }
        await db.ref(`seungri_v2026/brackets/Poomsae - ${subType}`).set({ type: 'PoomsaeGroup', groups: pGroups });
    } else {
        const rounds = buildKnockoutRounds(shuffled);
        await db.ref(`seungri_v2026/brackets/Kyorugi - ${subType}`).set({ type: 'Knockout', rounds });
    }
    alert("Thành công!");
}

function buildKnockoutRounds(players) {
    const size = Math.pow(2, Math.ceil(Math.log2(players.length))) || 2;
    let pArray = Array(size).fill(null).map(() => ({name: 'BYE', club: '-'}));
    const pos = size === 2 ? [0,1] : size === 4 ? [0,3,1,2] : size === 8 ? [0,7,3,4,1,6,2,5] : Array.from({length:size}, (_,i)=>i);
    players.forEach((p, i) => pArray[pos[i]] = {name: p.name, club: p.club});

    let r1 = [];
    for(let i=0; i<size; i+=2) {
        let m = { p1: pArray[i], p2: pArray[i+1], winner: null, matchNo: '', score: '' };
        if(m.p2.name === 'BYE') m.winner = m.p1; else if(m.p1.name === 'BYE') m.winner = m.p2;
        r1.push(m);
    }
    let rounds = [r1];
    let prev = r1;
    while(prev.length > 1) {
        let next = [];
        for(let j=0; j<prev.length; j+=2) {
            next.push({ p1: prev[j].winner || {name: '?'}, p2: prev[j+1].winner || {name: '?'}, winner: null, matchNo: '', score: '' });
        }
        rounds.push(next); prev = next;
    }
    return rounds;
}

// ĐIỀU HÀNH
function loadCurrentBracket() {
    const subType = document.getElementById('bracketSelect').value;
    const catKey = `${currentSubTab} - ${subType}`;
    const bracketArea = document.getElementById('bracketContent');
    const speedArea = document.getElementById('speedContent');
    const waitArea = document.getElementById('waitlistArea');
    
    const waitPlayers = Object.values(allAthletes).filter(r => r.category === currentSubTab && r.subType === subType);
    document.getElementById('waitCount').innerText = waitPlayers.length;
    document.getElementById('waitNames').innerHTML = waitPlayers.map(p => `<div>• ${p.name} (${p.club})</div>`).join('');
    waitArea.classList.toggle('hidden', waitPlayers.length === 0);

    bracketArea.innerHTML = ""; speedArea.innerHTML = "";
    bracketArea.classList.add('hidden'); speedArea.classList.add('hidden');

    if(!allBrackets[catKey]) return;

    const b = allBrackets[catKey];
    if(b.type === 'Speed') {
        speedArea.classList.remove('hidden'); renderSpeedTable(catKey);
    } else if(b.type === 'PoomsaeGroup') {
        bracketArea.classList.remove('hidden'); renderPoomsaeGroups(catKey);
    } else {
        bracketArea.classList.remove('hidden'); renderKnockoutBracket(catKey, b.rounds);
    }
}

function renderPoomsaeGroups(catKey) {
    const area = document.getElementById('bracketContent');
    const b = allBrackets[catKey];
    if(!b.groups) return;
    b.groups.forEach((group, gIdx) => {
        const wrap = document.createElement('div');
        wrap.className = 'mb-10 p-6 admin-card border-l-8 border-blue-600';
        wrap.innerHTML = `<h3 class="text-blue-500 font-black mb-6 uppercase">Nhóm ${group.groupId}</h3>`;
        const bDiv = document.createElement('div');
        bDiv.className = 'flex gap-10';
        group.rounds.forEach((round, ri) => {
            const col = document.createElement('div');
            col.className = 'round-column';
            col.innerHTML = `<div class="round-name">${ri === 0 ? "Bán kết" : "Chung kết"}</div>`;
            round.forEach((m, mi) => {
                const box = document.createElement('div');
                box.className = 'match-box';
                box.innerHTML = `<div class="match-no-label">(<input type="text" value="${m.matchNo || ''}" onblur="updatePoomsaeMatch('${catKey}',${gIdx},${ri},${mi},'matchNo',this.value)" class="match-no-input">)</div>`;
                box.appendChild(renderSlotGroup(catKey, gIdx, ri, mi, 1, m.p1, m.winner, m.score));
                box.appendChild(renderSlotGroup(catKey, gIdx, ri, mi, 2, m.p2, m.winner, m.score));
                col.appendChild(box);
            });
            bDiv.appendChild(col);
        });
        wrap.appendChild(bDiv);
        area.appendChild(wrap);
    });
    renderMedals(catKey);
}

function renderKnockoutBracket(catKey, rounds) {
    const area = document.getElementById('bracketContent');
    rounds.forEach((round, ri) => {
        const col = document.createElement('div'); col.className = 'round-column';
        col.innerHTML = `<div class="round-name">${getRoundName(ri, rounds.length)}</div>`;
        round.forEach((m, mi) => {
            const box = document.createElement('div'); box.className = 'match-box';
            box.innerHTML = `<div class="match-no-label">(<input type="text" value="${m.matchNo || ''}" onblur="updateMatchDetail('${catKey}',${ri},${mi},'matchNo',this.value)" class="match-no-input">)</div>`;
            box.appendChild(renderSlot(catKey, ri, mi, 1, m.p1, m.winner, m.score));
            box.appendChild(renderSlot(catKey, ri, mi, 2, m.p2, m.winner, m.score));
            col.appendChild(box);
        });
        area.appendChild(col);
    });
    renderMedals(catKey);
}

function getRoundName(ri, total) {
    if (ri === total - 1) return "Final";
    if (ri === total - 2) return "Semifinal";
    if (ri === total - 3) return "Quarterfinal";
    return "Qualifying";
}

function renderSlot(catKey, ri, mi, pNum, p, winner, score) {
    const isWin = winner && winner.name === p.name && p.name !== 'BYE';
    const isLoss = winner && winner.name !== p.name && p.name !== 'BYE';
    const div = document.createElement('div');
    div.className = `player-line ${isWin?'is-winner':''} ${isLoss?'is-loss':''} ${p.name==='BYE'?'opacity-20':''}`;
    div.innerHTML = `<div><span class="font-black uppercase">${p.name}</span><br><span class="text-[8px] opacity-50">${p.club}</span></div>`;
    if(p.name !== 'BYE' && p.name !== '?') {
        const sc = document.createElement('input');
        sc.className = 'score-input'; sc.value = (isWin && score) ? score : '';
        sc.onblur = (e) => updateMatchDetail(catKey, ri, mi, 'score', e.target.value);
        div.appendChild(sc);
        div.onclick = () => setWinner(catKey, ri, mi, pNum);
    }
    return div;
}

function renderSlotGroup(catKey, gIdx, ri, mi, pNum, p, winner, score) {
    const isWin = winner && winner.name === p.name && p.name !== 'BYE';
    const isLoss = winner && winner.name !== p.name && p.name !== 'BYE';
    const div = document.createElement('div');
    div.className = `player-line ${isWin?'is-winner':''} ${isLoss?'is-loss':''} ${p.name==='BYE'?'opacity-20':''}`;
    div.innerHTML = `<div><span class="font-black uppercase">${p.name}</span><br><span class="text-[8px] opacity-50">${p.club}</span></div>`;
    if(p.name !== 'BYE' && p.name !== '?') {
        const sc = document.createElement('input');
        sc.className = 'score-input'; sc.value = (isWin && score) ? score : '';
        sc.onblur = (e) => updatePoomsaeMatch(catKey, gIdx, ri, mi, 'score', e.target.value);
        div.appendChild(sc);
        div.onclick = () => setWinnerPoomsae(catKey, gIdx, ri, mi, pNum);
    }
    return div;
}

async function setWinner(catKey, ri, mi, pNum) {
    if (isUpdating) return; isUpdating = true;
    const b = allBrackets[catKey];
    const m = b.rounds[ri][mi];
    const sel = pNum === 1 ? m.p1 : m.p2;
    if (sel.name === '?' || sel.name === 'BYE') { isUpdating = false; return; }

    if (m.winner && m.winner.name === sel.name) m.winner = null; 
    else m.winner = sel;

    if (b.rounds[ri + 1]) {
        const nMi = Math.floor(mi / 2);
        const nP = (mi % 2 === 0) ? 'p1' : 'p2';
        b.rounds[ri + 1][nMi][nP] = m.winner || { name: '?', club: '' };
        resetFutureMatches(b, ri + 1, nMi);
    }
    await db.ref(`seungri_v2026/brackets/${catKey}`).set(b);
    isUpdating = false;
}

async function setWinnerPoomsae(catKey, gIdx, ri, mi, pNum) {
    if (isUpdating) return; isUpdating = true;
    const b = allBrackets[catKey];
    const m = b.groups[gIdx].rounds[ri][mi];
    const sel = pNum === 1 ? m.p1 : m.p2;
    if (sel.name === '?' || sel.name === 'BYE') { isUpdating = false; return; }

    if (m.winner && m.winner.name === sel.name) m.winner = null; else m.winner = sel;

    if (b.groups[gIdx].rounds[ri + 1]) {
        const nMi = Math.floor(mi / 2);
        const nP = (mi % 2 === 0) ? 'p1' : 'p2';
        b.groups[gIdx].rounds[ri + 1][nMi][nP] = m.winner || { name: '?', club: '' };
    }
    await db.ref(`seungri_v2026/brackets/${catKey}`).set(b);
    isUpdating = false;
}

function resetFutureMatches(b, ri, mi) {
    if (!b.rounds[ri]) return;
    const m = b.rounds[ri][mi]; m.winner = null; m.score = "";
    if (b.rounds[ri + 1]) {
        const nMi = Math.floor(mi / 2);
        const nP = (mi % 2 === 0) ? 'p1' : 'p2';
        b.rounds[ri + 1][nMi][nP] = { name: '?', club: '' };
        resetFutureMatches(b, ri + 1, nMi);
    }
}

// SPEED LOGIC
function renderSpeedTable(catKey) {
    const b = allBrackets[catKey];
    const body = document.getElementById('speedTableBody');
    let html = "";
    b.groups.forEach(g => {
        html += `<tr class="bg-blue-900/20"><td colspan="4" class="p-2 text-blue-400 font-black text-center uppercase">Nhóm ${g.groupId}</td></tr>`;
        g.players.forEach((p, pIdx) => {
            html += `<tr class="border-b border-slate-800">
                <td class="p-4 uppercase font-black text-xs">${p.name}</td>
                <td class="p-4 text-xs opacity-60">${p.club}</td>
                <td class="p-4"><input type="number" value="${p.score || 0}" onchange="updateSpeedScore('${catKey}', ${g.groupId-1}, ${pIdx}, this.value)" class="w-20 bg-slate-800 border-none rounded p-2 text-amber-500 font-bold"></td>
                <td class="p-4">${renderMedalIcon(p.rank)}</td>
            </tr>`;
        });
    });
    body.innerHTML = html; renderMedals(catKey);
}

async function updateSpeedScore(catKey, gIdx, pIdx, val) {
    const b = allBrackets[catKey];
    b.groups[gIdx].players[pIdx].score = parseFloat(val);
    const sorted = [...b.groups[gIdx].players].sort((a,b) => b.score - a.score);
    b.groups[gIdx].players.forEach(p => {
        const pos = sorted.findIndex(s => s.name === p.name);
        if(p.score > 0) {
            if(pos === 0) p.rank = 'GOLD';
            else if(pos === 1) p.rank = 'SILVER';
            else if(pos === 2 || pos === 3) p.rank = 'BRONZE';
            else p.rank = '';
        }
    });
    await db.ref(`seungri_v2026/brackets/${catKey}`).set(b);
}

function renderMedalIcon(r) { if(r==='GOLD') return '🥇 VÀNG'; if(r==='SILVER') return '🥈 BẠC'; if(r==='BRONZE') return '🥉 ĐỒNG'; return '-'; }

function renderMedals(catKey) {
    const area = document.getElementById('medalList'); area.innerHTML = "";
    const b = allBrackets[catKey]; if(!b) return;
    if(b.type === 'Speed') {
        b.groups.forEach(g => g.players.filter(p => p.rank).forEach(p => area.innerHTML += renderMedalTag(p.rank + ` (G${g.groupId})`, p, p.rank.toLowerCase())));
    } else if(b.type === 'PoomsaeGroup') {
        b.groups.forEach(g => {
            const finalM = g.rounds[g.rounds.length-1][0];
            const gP = finalM.winner; const sP = gP ? (gP.name === finalM.p1.name ? finalM.p2 : finalM.p1) : null;
            if(gP) area.innerHTML += renderMedalTag(`🥇 VÀNG (G${g.groupId})`, gP, 'gold');
            if(sP && sP.name !== 'BYE') area.innerHTML += renderMedalTag(`🥈 BẠC (G${g.groupId})`, sP, 'silver');
        });
    } else {
        const last = b.rounds[b.rounds.length - 1][0];
        const g = last.winner; const s = g ? (g.name === last.p1.name ? last.p2 : last.p1) : null;
        if(g) area.innerHTML += renderMedalTag('🥇 VÀNG', g, 'gold');
        if(s && s.name !== 'BYE') area.innerHTML += renderMedalTag('🥈 BẠC', s, 'silver');
    }
}

function renderMedalTag(l, p, s) {
    const ico = l.includes('VÀNG')?'🥇':l.includes('BẠC')?'🥈':'🥉';
    return `<div class="medal-tag ${s}"><span class="text-xl">${ico}</span><div><span class="text-[8px] opacity-60 uppercase">${l}</span><br><span class="text-xs font-black uppercase">${p?.name || '---'}</span></div></div>`;
}

// UPDATE HELPERS
async function updateMatchDetail(catKey, ri, mi, f, v) { await db.ref(`seungri_v2026/brackets/${catKey}/rounds/${ri}/${mi}`).update({ [f]: v }); }
async function updatePoomsaeMatch(catKey, gIdx, ri, mi, f, v) { await db.ref(`seungri_v2026/brackets/${catKey}/groups/${gIdx}/rounds/${ri}/${mi}`).update({ [f]: v }); }

// BASIC DATA HELPERS
function renderUserTable() {
    const body = document.getElementById('userListBody');
    body.innerHTML = Object.keys(allUsers).map(k => `<tr><td class="p-4 text-blue-400">${k.replace(/,/g,'.')}</td><td class="p-4"><input type="text" value="${allUsers[k].pass}" onchange="updatePass('${k}', this.value)" class="!py-1 !text-xs !bg-slate-800"></td><td class="p-4 italic opacity-50" id="club-${k}">Loading...</td><td class="p-4 text-center"><button onclick="deleteUser('${k}')" class="text-red-500">Xóa</button></td></tr>`).join('');
    Object.keys(allUsers).forEach(k => db.ref('seungri_v2026/last_club/'+k).once('value', s => { if(s.exists()) document.getElementById('club-'+k).innerText = s.val(); }));
}
function updatePass(k, p) { db.ref('seungri_v2026/users/'+k).update({pass: p}); }
function deleteUser(k) { if(confirm("Xóa?")) db.ref('seungri_v2026/users/'+k).remove(); }
function renderAthleteTable() {
    const body = document.getElementById('athleteTableBody');
    const search = document.getElementById('searchVdv').value.toLowerCase();
    body.innerHTML = Object.keys(allAthletes).filter(k => allAthletes[k].name.toLowerCase().includes(search)).map(k => {
        const r = allAthletes[k];
        return `<tr><td class="p-4 uppercase">${r.name}</td><td class="p-4 text-blue-400 uppercase">${r.club}</td><td class="p-4 opacity-60">${r.category}</td><td class="p-4 text-[10px]">${r.subType}</td><td class="p-4 text-center"><button onclick="toggleLock('${k}', ${!r.isLocked})" class="px-3 py-1 rounded-lg ${r.isLocked?'bg-red-600':'bg-slate-700'}">${r.isLocked?'LOCKED':'OPEN'}</button></td><td class="p-4 text-center"><button onclick="deleteVdv('${k}')" class="text-red-500">✕</button></td></tr>`;
    }).join('');
}
function toggleLock(k, v) { db.ref('seungri_v2026/registrations/'+k).update({isLocked: v}); }
function setGlobalLock(s) { const up = {}; Object.keys(allAthletes).forEach(k => up[k+'/isLocked'] = s); db.ref('seungri_v2026/registrations').update(up); }
function deleteVdv(k) { if(confirm("Xóa?")) db.ref('seungri_v2026/registrations/'+k).remove(); }
function exportData() {
    const data = Object.values(allAthletes).map((r,i) => ({STT:i+1, Tên:r.name, CLB:r.club, Nội_Dung:r.category, Hạng_Cân:r.subType}));
    const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "VDV"); XLSX.writeFile(wb, "SEUNGRI_2026.xlsx");
}
